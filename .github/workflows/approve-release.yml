name: Approuver et publier

on:
  workflow_dispatch:
    inputs:
      locale:
        description: 'Locale to release (en or fr)'
        required: true
        default: 'en'
        type: choice
        options:
          - en
          - fr

permissions:
  contents: write

# Globally queue all release runs regardless of locale. Two simultaneous
# approve-release runs (EN + FR, or a re-run while the first is in flight)
# both mutate data/state/ and docs/social-feed.xml — without this group
# they race on `git push` and hit the retry-loop (observed 2026-04-16).
# One queue across locales is simpler than per-locale since the social-feed
# job reads both histories anyway.
concurrency:
  group: release-workflow
  cancel-in-progress: false

jobs:
  approve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      released: ${{ steps.release.outputs.released }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Pull latest state
        run: git pull --rebase origin main

      - name: Release pending draft
        id: release
        env:
          APR_LOCALE: ${{ inputs.locale }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          R2_BUCKET_NAME: ${{ vars.APR_TEST_R2_BUCKET_NAME || vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.APR_TEST_R2_ENDPOINT || vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.APR_TEST_R2_ACCESS_KEY_ID || secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.APR_TEST_R2_SECRET_ACCESS_KEY || secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set +e
          output=$(python scripts/release_draft.py 2>&1)
          exit_code=$?
          echo "$output"
          if [ $exit_code -eq 0 ]; then
            echo "released=true" >> $GITHUB_OUTPUT
          elif echo "$output" | grep -q "No pending draft"; then
            echo "Aucun draft en attente — skip release"
            echo "released=false" >> $GITHUB_OUTPUT
          else
            echo "::error::release_draft.py a échoué de façon inattendue"
            exit $exit_code
          fi

      - name: Commit published state
        if: steps.release.outputs.released == 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state/ docs/
          git diff --cached --quiet || git commit -m "release: manually approved episode [skip ci]"
          # Retry on push race — two simultaneous approve-release runs (EN+FR)
          # both pull, commit, push: whichever pushes first wins and the loser
          # must rebase onto the new tip. Observed on 2026-04-16.
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "push rejected — rebasing (attempt $attempt)"
            git pull --rebase origin main
          done
          echo "::error::push failed after 3 rebase attempts"
          exit 1

  # Upload the released episode to YouTube (static cover + audio → MP4).
  # Soft-skips gracefully if YOUTUBE_CLIENT_ID / YOUTUBE_REFRESH_TOKEN are
  # not set in GitHub Secrets — no failure, just a "skipping" log line.
  # Only runs when a real episode was released (approve.outputs.released == true).
  youtube:
    needs: approve
    if: ${{ needs.approve.outputs.released == 'true' }}
    uses: ./.github/workflows/youtube-upload.yml
    with:
      locale: ${{ inputs.locale }}
    secrets: inherit

  # Rebuild the merged bilingual social feed after every run.
  # if: always() so it runs even when there is no new draft.
  social-feed:
    needs: approve
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Pull latest (approve may have pushed a release commit)
        run: git pull --rebase origin main

      - name: Build social-feed.xml (EN+FR merged)
        run: |
          set -e
          python -c "from ai_press_review.publish.feed import build_social_feed; print(f'Social feed written: {build_social_feed()}')"

      - name: Commit social feed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/social-feed.xml
          git diff --cached --quiet || git commit -m "social: refresh EN+FR LinkedIn feed [skip ci]"
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "push rejected — rebasing (attempt $attempt)"
            git pull --rebase origin main
          done
          echo "::error::push failed after 3 rebase attempts"
          exit 1

