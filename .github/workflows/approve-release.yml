name: Approve & Release Now

# Declenchement manuel pour publier le draft immediatement
# (sans attendre l'auto-release de 10h).
#
# Second job `social-feed` rebuilds docs/social-feed.xml (EN+FR merged
# RSS for the external LinkedIn auto-poster) after every release.
# Runs after `approve` so the newly-released episode shows up in the
# social feed immediately. `if: always()` keeps the rebuild running
# even when approve has nothing to publish (no-op path).

on:
  workflow_dispatch:
    inputs:
      locale:
        description: 'Locale to release (en or fr)'
        required: true
        default: 'en'
        type: choice
        options:
          - en
          - fr

permissions:
  contents: write

# Globally queue all release runs regardless of locale. Two simultaneous
# approve-release runs (EN + FR, or a re-run while the first is in flight)
# both mutate data/state/ and docs/social-feed.xml — without this group
# they race on `git push` and hit the retry-loop (observed 2026-04-16).
# One queue across locales is simpler than per-locale since the social-feed
# job reads both histories anyway.
concurrency:
  group: release-workflow
  cancel-in-progress: false

jobs:
  approve:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Pull latest state
        run: git pull --rebase origin main

      - name: Release pending draft
        env:
          APR_LOCALE: ${{ inputs.locale }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.CLOUD_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUD_SECRET_KEY }}
        run: python scripts/release_draft.py

      - name: Commit published state
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state/ docs/
          git diff --cached --quiet || git commit -m "release: manually approved episode [skip ci]"
          # Retry on push race — two simultaneous approve-release runs (EN+FR)
          # both pull, commit, push: whichever pushes first wins and the loser
          # must rebase onto the new tip. Observed on 2026-04-16.
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "push rejected — rebasing (attempt $attempt)"
            git pull --rebase origin main
          done
          echo "::error::push failed after 3 rebase attempts"
          exit 1

  # Upload the released episode to YouTube (static cover + audio → MP4).
  # Soft-skips gracefully if YOUTUBE_CLIENT_ID / YOUTUBE_REFRESH_TOKEN are
  # not set in GitHub Secrets — no failure, just a "skipping" log line.
  youtube:
    needs: approve
    if: needs.approve.result == 'success'
    uses: ./.github/workflows/youtube-upload.yml
    with:
      locale: ${{ inputs.locale }}
    secrets: inherit

  # Rebuild the merged bilingual LinkedIn-oriented feed from both locales'
  # episode histories on main, after the approve job has (possibly) pushed
  # a newly-published episode. `if: always()` keeps this running even if
  # approve skipped (no pending draft for that locale).
  social-feed:
    needs: approve
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Pull latest (approve may have pushed a release commit)
        run: git pull --rebase origin main

      - name: Build social-feed.xml (EN+FR merged)
        run: |
          set -e
          python -c "from ai_press_review.publish.feed import build_social_feed; print(f'Social feed written: {build_social_feed()}')"

      - name: Commit social feed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/social-feed.xml
          git diff --cached --quiet || git commit -m "social: refresh EN+FR LinkedIn feed [skip ci]"
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "push rejected — rebasing (attempt $attempt)"
            git pull --rebase origin main
          done
          echo "::error::push failed after 3 rebase attempts"
          exit 1
