name: Simuler le pipeline (sans publication)

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: Run date in JJ/MM/AA format (e.g. 18/04/26)
        required: false
        default: ''
      profile:
        description: Editorial profile
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
      locale:
        description: Locale (en or fr) — picks the per-locale LLM model + voice
        required: false
        default: 'en'

jobs:
  cloud_dry_run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # Always pin to main so the dry run exercises the exact same code that
      # daily-generate.yml will run — not a feature branch or stale fork.
      # This also ensures no WIP code accidentally reaches TTS or the LLM.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short

      # Crawl4AI/Playwright abandoned 2026-04-18 — see extractors/web_content.py.
      # The crawler is now httpx async; no browser install step required.
      # cloud_dry_run.py calls run_pipeline(upload_audio=False, publish_feed=False).
      # It writes only to output/ (artifact below). It does NOT write to
      # data/state/ and does NOT create a pending_draft — so nothing can be
      # accidentally released after a dry run.
      - name: Run cloud dry run
        env:
          # Locale selector — drives settings._apply_locale() so the per-locale
          # LLM model + Cartesia voice get picked up. Defaults to 'en' if the
          # workflow is triggered without the input.
          APR_LOCALE: ${{ github.event.inputs.locale || 'en' }}
          PODCAST_DESCRIPTION_LONG: ${{ vars.PODCAST_DESCRIPTION_LONG }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          # Generic model vars — fallback when no per-locale override is set.
          # Can be empty if the repo has migrated entirely to per-locale vars;
          # settings._apply_locale() reads _EN / _FR below first.
          LLM_EDITOR_MODEL: ${{ vars.LLM_EDITOR_MODEL }}
          LLM_FALLBACK_MODEL: ${{ vars.LLM_FALLBACK_MODEL }}
          # Optional 3rd cascade tier, kicks in after editor + fallback both
          # hit MAX_QUOTA_HITS. Unset to disable.
          LLM_EMERGENCY_MODEL: ${{ vars.LLM_EMERGENCY_MODEL }}
          # Per-locale overrides — MUST be passed explicitly even to dry-run,
          # otherwise settings sees empty generic vars and the cascade has no
          # model to try (observed failure mode: "All editorial generation
          # attempts failed:" with an empty error list — because the cascade
          # never iterated at all).
          LLM_EDITOR_MODEL_EN: ${{ vars.LLM_EDITOR_MODEL_EN }}
          LLM_FALLBACK_MODEL_EN: ${{ vars.LLM_FALLBACK_MODEL_EN }}
          LLM_EMERGENCY_MODEL_EN: ${{ vars.LLM_EMERGENCY_MODEL_EN }}
          LLM_EDITOR_MODEL_FR: ${{ vars.LLM_EDITOR_MODEL_FR }}
          LLM_FALLBACK_MODEL_FR: ${{ vars.LLM_FALLBACK_MODEL_FR }}
          LLM_EMERGENCY_MODEL_FR: ${{ vars.LLM_EMERGENCY_MODEL_FR }}
          # Per-tier endpoint overrides — see daily-generate.yml for rationale.
          # Shorthands (sonnet/haiku/opus) auto-resolve for api.anthropic.com.
          LLM_EDITOR_BASE_URL_EN: ${{ vars.LLM_EDITOR_BASE_URL_EN }}
          LLM_EDITOR_API_KEY_EN: ${{ secrets.LLM_EDITOR_API_KEY_EN }}
          LLM_EDITOR_BASE_URL_FR: ${{ vars.LLM_EDITOR_BASE_URL_FR }}
          LLM_EDITOR_API_KEY_FR: ${{ secrets.LLM_EDITOR_API_KEY_FR }}
          LLM_FALLBACK_BASE_URL_EN: ${{ vars.LLM_FALLBACK_BASE_URL_EN }}
          LLM_FALLBACK_API_KEY_EN: ${{ secrets.LLM_FALLBACK_API_KEY_EN }}
          LLM_FALLBACK_BASE_URL_FR: ${{ vars.LLM_FALLBACK_BASE_URL_FR }}
          LLM_FALLBACK_API_KEY_FR: ${{ secrets.LLM_FALLBACK_API_KEY_FR }}
          LLM_EMERGENCY_BASE_URL_EN: ${{ vars.LLM_EMERGENCY_BASE_URL_EN }}
          LLM_EMERGENCY_API_KEY_EN: ${{ secrets.LLM_EMERGENCY_API_KEY_EN || secrets.DEEPINFRA_API_KEY }}
          LLM_EMERGENCY_BASE_URL_FR: ${{ vars.LLM_EMERGENCY_BASE_URL_FR }}
          LLM_EMERGENCY_API_KEY_FR: ${{ secrets.LLM_EMERGENCY_API_KEY_FR || secrets.DEEPINFRA_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          # Free Layer-2 crawler fallback (Jina Reader). Anonymous if unset.
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          JINA_READER_ENABLED: ${{ vars.JINA_READER_ENABLED }}
          CARTESIA_API_KEY: ${{ secrets.CARESTIA_API_KEY }}
          # Both voice IDs — settings._apply_locale picks the right one via
          # voice_id_env in podcast.yaml.
          CARTESIA_VOICE_ID: ${{ vars.CARTESIA_VOICE_ID }}
          CARTESIA_VOICE_ID_FR: ${{ vars.CARTESIA_VOICE_ID_FR }}
          NEWSAPI_API_KEY: ${{ secrets.NEWS_API_KEY }}
          # Shell-injection hardening — untrusted inputs come via env only.
          RUN_DATE_INPUT: ${{ github.event.inputs.run_date }}
          PROFILE_INPUT: ${{ github.event.inputs.profile }}
        run: |
          set -e
          RUN_DATE="${RUN_DATE_INPUT}"
          if [ -z "$RUN_DATE" ]; then RUN_DATE=$(date +%F); fi
          # Convert European JJ/MM/AA or JJ/MM/AAAA → YYYY-MM-DD for internal use
          if [[ "$RUN_DATE" =~ ^([0-9]{2})/([0-9]{2})/([0-9]{2})$ ]]; then
            RUN_DATE="20${BASH_REMATCH[3]}-${BASH_REMATCH[2]}-${BASH_REMATCH[1]}"
          elif [[ "$RUN_DATE" =~ ^([0-9]{2})/([0-9]{2})/([0-9]{4})$ ]]; then
            RUN_DATE="${BASH_REMATCH[3]}-${BASH_REMATCH[2]}-${BASH_REMATCH[1]}"
          fi
          if ! [[ "$RUN_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::Invalid run_date format: $RUN_DATE (expected JJ/MM/AA, e.g. 18/04/26)"
            exit 1
          fi
          # Normalize input before whitelist check — tolerates Weekly-recap,
          # weekly-recap, Weekly_Recap etc. from API/programmatic callers.
          PROFILE_INPUT=$(echo "$PROFILE_INPUT" | tr '[:upper:]' '[:lower:]' | tr '-' '_')
          # Profile whitelist — reject anything that isn't one of the two
          # expected profile names, keeps crafted inputs from reaching argv.
          case "$PROFILE_INPUT" in
            daily) PROFILE="daily" ;;
            weekly|weekly_recap) PROFILE="weekly_recap" ;;
            *) echo "::error::Invalid profile: $PROFILE_INPUT"; exit 1 ;;
          esac
          echo "Locale: $APR_LOCALE"
          # Fail fast if LLM_API_KEY is empty — avoids 8-minute crawl then 401
          python3 - <<'KEYCHECK'
          import os, sys
          key = os.environ.get("LLM_API_KEY", "").strip()
          if not key or key.lower() in {"none","null","placeholder","changeme","xxx","todo"}:
              hint = repr(key) if key else "(empty)"
              sys.exit(
                  f"ERROR: LLM_API_KEY is {hint} — update secret in repo Settings → "
                  "Secrets and variables → Actions → LLM_API_KEY"
              )
          print(f"LLM_API_KEY OK — {len(key)} chars, starts with {key[:6]}...")
          KEYCHECK
          # Fail fast with a clear message if no model is resolvable for this
          # locale — avoids the 9-minute-crawl-then-empty-error surprise.
          python -c "
          import os, sys
          loc = os.environ.get('APR_LOCALE', 'en').upper()
          candidates = [
              os.environ.get(f'LLM_EDITOR_MODEL_{loc}', ''),
              os.environ.get('LLM_EDITOR_MODEL', ''),
          ]
          if not any(c.strip() for c in candidates):
              sys.exit(
                  f'ERROR: no editor model set for locale {loc}. '
                  f'Set repo Variable LLM_EDITOR_MODEL_{loc} or LLM_EDITOR_MODEL.'
              )
          print(f'Editor model resolved for {loc}: ' + next(c for c in candidates if c.strip()))
          "
          python scripts/cloud_dry_run.py --date "$RUN_DATE" --profile "$PROFILE"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cloud-dry-run-output
          path: output/
          retention-days: 7
