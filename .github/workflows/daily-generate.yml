name: Générer — épisode du jour

# Genere l'episode quotidien Mar-Ven a 5h45 Paris (3h45 UTC ete / 4h45 UTC hiver)
# Le podcast publie a 7h Paris — le run demarre a 5h45 pour laisser ~1h15
# de marge avant le drop (debugging, re-run TTS, approbation manuelle si besoin).
# Matrix: genere EN puis FR en serie (max-parallel: 1) pour eviter les races
# sur git push. Chaque locale ecrit son propre state (episode_history_{en,fr}.json),
# ses propres pages (docs/ vs docs/fr/) et son propre prefixe audio R2.
# L'audio est uploade sur R2 pour ecoute preview.
# Le feed RSS n'est PAS mis a jour — voir auto-release.yml

on:
  schedule:
    # Two crons stabilize the Paris 5h45 local time year-round. GitHub cron
    # runs on UTC, so a single '45 3' entry that's correct in summer (CEST =
    # UTC+2) publishes an hour early in winter (CET = UTC+1). Before this
    # split, the workflow comment said 'ajuster en hiver si besoin' — which
    # no one ever did, so Nov–Mar runs fired at 4h45 Paris for the listener.
    # The month lists are disjoint, so only one fires on any given day. The
    # two DST-switch Sundays each year produce at most a 1-hour skew on
    # Tuesday's run; that's acceptable versus the everyday 1-hour drift.
    - cron: '45 3 * 4-10 2-5'       # 5h45 Paris CEST (Apr-Oct, UTC+2)
    - cron: '45 4 * 1-3,11,12 2-5'  # 5h45 Paris CET  (Nov-Mar, UTC+1)
  workflow_dispatch:
    inputs:
      run_date:
        description: Run date (JJ/MM/AA, e.g. 18/04/26)
        required: false
        default: ''
      profile:
        description: Editorial profile
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
      locale:
        description: Locale to run (leave empty for all enabled, or 'en'/'fr')
        required: false
        default: ''

permissions:
  contents: write

# Prevent two runs of daily-generate from racing on git push — e.g. a
# manual dispatch triggered while the scheduled run is still in flight.
# Queue rather than cancel: a half-finished pipeline may have already
# uploaded audio to R2, and we want its state commit to land cleanly.
concurrency:
  group: daily-generate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false       # FR doit tourner meme si EN casse
      max-parallel: 1        # serialise les git push pour eviter les races
      matrix:
        # Filter the matrix itself so non-selected locales never spawn a job.
        # dispatch with locale=fr → ["fr"]; schedule / empty → ["en","fr"].
        # FR re-enabled 2026-04-24: voice clone integrated (CARTESIA_VOICE_ID_FR).
        locale: ${{ fromJSON(github.event.inputs.locale != '' && format('["{0}"]', github.event.inputs.locale) || '["en","fr"]') }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main           # toujours partir de main pour cumuler EN puis FR

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Generate daily draft
        env:
          # Locale selector — drives load_settings() + state file suffix
          APR_LOCALE: ${{ matrix.locale }}
          PODCAST_DESCRIPTION_LONG: ${{ vars.PODCAST_DESCRIPTION_LONG }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          # Generic model vars — used as fallback when no per-locale override is set.
          # Backward-compatible: a repo that only sets these continues to work
          # with both EN and FR jobs sharing the same model.
          LLM_EDITOR_MODEL: ${{ vars.LLM_EDITOR_MODEL }}
          LLM_FALLBACK_MODEL: ${{ vars.LLM_FALLBACK_MODEL }}
          # Optional 3rd cascade tier — leave the repo var unset to disable.
          # Set this to a non-Gemini model (e.g. an OpenRouter Anthropic or
          # OpenAI route) so a Google-side quota exhaustion doesn't bring the
          # whole daily run down. See generator.py: cascade kicks in after
          # MAX_QUOTA_HITS (2) on the editor model, then again on fallback.
          LLM_EMERGENCY_MODEL: ${{ vars.LLM_EMERGENCY_MODEL }}
          # Per-locale model overrides — settings._apply_locale() picks the
          # right one based on APR_LOCALE. Lets us run Mistral Large 2411 for
          # FR (sophisticated French register) and Claude Sonnet 4.5 for EN
          # (journalism tone), all via OpenRouter with one API key. Set them
          # in repo Variables to enable; leave any unset to fall back to the
          # generic LLM_EDITOR_MODEL / LLM_FALLBACK_MODEL above.
          LLM_EDITOR_MODEL_EN: ${{ vars.LLM_EDITOR_MODEL_EN }}
          LLM_FALLBACK_MODEL_EN: ${{ vars.LLM_FALLBACK_MODEL_EN }}
          LLM_EMERGENCY_MODEL_EN: ${{ vars.LLM_EMERGENCY_MODEL_EN }}
          LLM_EDITOR_MODEL_FR: ${{ vars.LLM_EDITOR_MODEL_FR }}
          LLM_FALLBACK_MODEL_FR: ${{ vars.LLM_FALLBACK_MODEL_FR }}
          LLM_EMERGENCY_MODEL_FR: ${{ vars.LLM_EMERGENCY_MODEL_FR }}
          # Per-tier endpoint overrides — route any tier at a different provider
          # (e.g. Anthropic direct, DeepInfra) so an OpenRouter incident on one
          # tier still leaves working escape hatches. Empty values fall through
          # to LLM_BASE_URL / LLM_API_KEY.
          # Model ID format differs by provider:
          #   OpenRouter       → anthropic/claude-sonnet-4.5  (dot, with prefix)
          #   Anthropic direct → claude-sonnet-4-6            (dash, no prefix)
          # Shorthands (sonnet/haiku/opus) are auto-resolved for api.anthropic.com.
          LLM_EDITOR_BASE_URL_EN: ${{ vars.LLM_EDITOR_BASE_URL_EN }}
          LLM_EDITOR_API_KEY_EN: ${{ secrets.LLM_EDITOR_API_KEY_EN }}
          LLM_EDITOR_BASE_URL_FR: ${{ vars.LLM_EDITOR_BASE_URL_FR }}
          LLM_EDITOR_API_KEY_FR: ${{ secrets.LLM_EDITOR_API_KEY_FR }}
          LLM_FALLBACK_BASE_URL_EN: ${{ vars.LLM_FALLBACK_BASE_URL_EN }}
          LLM_FALLBACK_API_KEY_EN: ${{ secrets.LLM_FALLBACK_API_KEY_EN }}
          LLM_FALLBACK_BASE_URL_FR: ${{ vars.LLM_FALLBACK_BASE_URL_FR }}
          LLM_FALLBACK_API_KEY_FR: ${{ secrets.LLM_FALLBACK_API_KEY_FR }}
          LLM_EMERGENCY_BASE_URL_EN: ${{ vars.LLM_EMERGENCY_BASE_URL_EN }}
          LLM_EMERGENCY_API_KEY_EN: ${{ secrets.APR_TEST_DEEPINFRA_API_KEY || secrets.DEEPINFRA_API_KEY }}
          LLM_EMERGENCY_BASE_URL_FR: ${{ vars.LLM_EMERGENCY_BASE_URL_FR }}
          LLM_EMERGENCY_API_KEY_FR: ${{ secrets.APR_TEST_DEEPINFRA_API_KEY || secrets.DEEPINFRA_API_KEY }}
          LLM_API_KEY: ${{ secrets.APR_TEST_LLM_API_KEY || secrets.LLM_API_KEY }}
          # Free Layer-2 crawler fallback. Jina Reader works anonymously at
          # ~20 req/min which is typically enough for the post-Layer-1 residue;
          # setting JINA_API_KEY (free tier) bumps it to ~200 req/min. Leave
          # the secret unset to stay anonymous, or set JINA_READER_ENABLED=false
          # to disable the fallback entirely.
          JINA_API_KEY: ${{ secrets.APR_TEST_JINA_API_KEY || secrets.JINA_API_KEY }}
          JINA_READER_ENABLED: ${{ vars.JINA_READER_ENABLED }}
          # APR_TEST_CARTESIA_API_KEY overrides prod for test runs. Falls back
          # through the legacy typo (CARESTIA) so old secrets still work.
          CARTESIA_API_KEY: ${{ secrets.APR_TEST_CARTESIA_API_KEY || secrets.APR_TEST_CARESTIA_API_KEY || secrets.CARTESIA_API_KEY || secrets.CARESTIA_API_KEY }}
          # Both voice IDs are passed — settings._apply_locale picks the right
          # one via voice_id_env in podcast.yaml (CARTESIA_VOICE_ID for EN,
          # CARTESIA_VOICE_ID_FR for FR).
          CARTESIA_VOICE_ID: ${{ vars.CARTESIA_VOICE_ID }}
          CARTESIA_VOICE_ID_FR: ${{ vars.CARTESIA_VOICE_ID_FR }}
          R2_BUCKET_NAME: ${{ vars.APR_TEST_R2_BUCKET_NAME || vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.APR_TEST_R2_ENDPOINT || vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.APR_TEST_R2_ACCESS_KEY_ID || secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.APR_TEST_R2_SECRET_ACCESS_KEY || secrets.R2_SECRET_ACCESS_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.APR_TEST_NEWS_API_KEY || secrets.NEWS_API_KEY }}
          # Untrusted workflow input — MUST be read via env to avoid shell
          # injection. Pasting `${{ github.event.inputs.run_date }}` directly
          # into a `run:` script lets a triggering actor execute arbitrary
          # shell via a crafted input. See GitHub Actions Security Hardening.
          RUN_DATE_INPUT: ${{ github.event.inputs.run_date }}
          PROFILE_INPUT: ${{ github.event.inputs.profile || 'daily' }}
        run: |
          set -e
          # ── Pre-flight: fail fast on missing secrets/variables ──────────────
          # Before this block an empty secret meant every LLM/TTS/R2 call
          # failed late with a 401 or missing-credential error, after the
          # pipeline had already burned 8+ minutes crawling. The original
          # LLM_API_KEY-only check caught the most common case, but a missing
          # CARTESIA_* or R2_* still only surfaced at the end of a full run.
          # Now we validate every required input in one pass and emit a
          # consolidated error listing exactly what to set. Same block is
          # copied into weekly-generate.yml — keep them in sync.
          python3 - <<'PREFLIGHT'
          import os, sys
          locale = os.environ.get("APR_LOCALE", "en").strip().lower() or "en"
          locale_upper = locale.upper()
          voice_var = "CARTESIA_VOICE_ID_FR" if locale == "fr" else "CARTESIA_VOICE_ID"
          required = [
              ("CARTESIA_API_KEY",    "secret",   "Cartesia API key (TTS)"),
              ("R2_ACCESS_KEY_ID",    "secret",   "Cloudflare R2 access key ID (audio upload)"),
              ("R2_SECRET_ACCESS_KEY","secret",   "Cloudflare R2 secret access key (audio upload)"),
              ("R2_BUCKET_NAME",      "variable", "Cloudflare R2 bucket name"),
              ("R2_ENDPOINT",         "variable", "Cloudflare R2 endpoint URL"),
              (voice_var,             "variable", f"Cartesia voice ID for locale={locale}"),
          ]
          placeholders = {"none", "null", "placeholder", "changeme",
                          "your-api-key", "your_api_key", "xxx", "todo"}
          missing = []
          for name, kind, desc in required:
              val = os.environ.get(name, "").strip()
              if not val:
                  missing.append(f"  - {name} ({kind}) -- {desc}")
              elif val.lower() in placeholders:
                  missing.append(f"  - {name} ({kind}) -- placeholder value {val!r}, {desc}")
          # LLM key: generic LLM_API_KEY (OpenRouter) OR a per-locale editor key
          # when routing the editor tier directly (e.g. to api.anthropic.com).
          llm_key = (
              os.environ.get(f"LLM_EDITOR_API_KEY_{locale_upper}", "").strip() or
              os.environ.get("LLM_API_KEY", "").strip()
          )
          if not llm_key:
              missing.append(
                  f"  - LLM_API_KEY (secret) -- OpenRouter key (editorial)\n"
                  f"    OR set LLM_EDITOR_API_KEY_{locale_upper} when routing editor tier directly"
              )
          elif llm_key.lower() in placeholders:
              missing.append(f"  - LLM_API_KEY (secret) -- placeholder value, set a real API key")
          # R2 credential length check — catches swapped or wrong-type keys in 5s
          # instead of after 25min of crawl+LLM+TTS. R2 S3-compatible Access Key
          # ID is always 32 chars; Secret Access Key is always 64 chars. Any other
          # length means wrong credential type (e.g. API token, account ID).
          # To generate correct keys: Cloudflare Dashboard → R2 → Manage API Tokens
          # → Create API Token with Object Read & Write on the relevant bucket.
          r2_ak = os.environ.get("R2_ACCESS_KEY_ID", "").strip()
          r2_sk = os.environ.get("R2_SECRET_ACCESS_KEY", "").strip()
          if r2_ak and len(r2_ak) != 32:
              missing.append(
                  f"  - R2_ACCESS_KEY_ID has {len(r2_ak)} chars (expected 32) -- "
                  "go to Cloudflare R2 → Manage API Tokens → create an R2-specific token"
              )
          if r2_sk and len(r2_sk) != 64:
              missing.append(
                  f"  - R2_SECRET_ACCESS_KEY has {len(r2_sk)} chars (expected 64) -- "
                  "go to Cloudflare R2 → Manage API Tokens → create an R2-specific token"
              )
          # Validate model variables — none should be set to an endpoint URL.
          # Caused a weekly crash: LLM_FALLBACK_MODEL_EN="https://api.anthropic.com/v1"
          # was used as a model ID, producing HTTP 401 Missing Authentication header.
          model_vars = [
              "LLM_EDITOR_MODEL", f"LLM_EDITOR_MODEL_{locale_upper}",
              "LLM_FALLBACK_MODEL", f"LLM_FALLBACK_MODEL_{locale_upper}",
              "LLM_EMERGENCY_MODEL", f"LLM_EMERGENCY_MODEL_{locale_upper}",
          ]
          for var in model_vars:
              val = os.environ.get(var, "").strip()
              if val.lower().startswith(("http://", "https://")):
                  missing.append(
                      f"  - {var} is set to a URL ({val!r}) — must be a model ID, not an endpoint URL.\n"
                      f"    Correct model IDs: claude-sonnet-4-6 (Anthropic direct) or anthropic/claude-sonnet-4.5 (OpenRouter)\n"
                      f"    Endpoint URLs go in: LLM_EDITOR_BASE_URL(_EN/_FR), LLM_FALLBACK_BASE_URL(_EN/_FR), LLM_EMERGENCY_BASE_URL(_EN/_FR)"
                  )
          if missing:
              sys.exit(
                  "ERROR: required secrets/variables are missing or empty:\n"
                  + "\n".join(missing)
                  + "\n\nGo to repo Settings -> Secrets and variables -> Actions.\n"
                  "  Secrets in the 'Secrets' tab. Variables in the 'Variables' tab.\n"
                  "  R2 keys: Cloudflare Dashboard → R2 → Manage API Tokens.\n"
                  "TIP: For safe test runs set APR_TEST_* overrides (e.g. APR_TEST_LLM_API_KEY,\n"
                  "  APR_TEST_CARTESIA_API_KEY, APR_TEST_R2_BUCKET_NAME …) — they shadow\n"
                  "  the matching production secret/variable without touching prod data."
              )
          hint = llm_key[:6] + "..." if len(llm_key) > 6 else llm_key[:3] + "..."
          print(f"Pre-flight OK - LLM key: {len(llm_key)} chars, starts with {hint}")
          print(f"Pre-flight OK - R2_ACCESS_KEY_ID: {len(r2_ak)} chars (expected 32)")
          print(f"Pre-flight OK - R2_SECRET_ACCESS_KEY: {len(r2_sk)} chars (expected 64)")
          PREFLIGHT
          RUN_DATE="${RUN_DATE_INPUT}"
          if [ -z "$RUN_DATE" ]; then RUN_DATE=$(date +%F); fi
          # Convert European JJ/MM/AA or JJ/MM/AAAA → YYYY-MM-DD for internal use
          if [[ "$RUN_DATE" =~ ^([0-9]{2})/([0-9]{2})/([0-9]{2})$ ]]; then
            RUN_DATE="20${BASH_REMATCH[3]}-${BASH_REMATCH[2]}-${BASH_REMATCH[1]}"
          elif [[ "$RUN_DATE" =~ ^([0-9]{2})/([0-9]{2})/([0-9]{4})$ ]]; then
            RUN_DATE="${BASH_REMATCH[3]}-${BASH_REMATCH[2]}-${BASH_REMATCH[1]}"
          fi
          # Validate shape — must be YYYY-MM-DD after conversion.
          if ! [[ "$RUN_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::Invalid run_date format: $RUN_DATE (expected JJ/MM/AA, e.g. 18/04/26)"
            exit 1
          fi
          APR_LOCALE=$(echo "$APR_LOCALE" | tr '[:upper:]' '[:lower:]')
          PROFILE_INPUT=$(echo "$PROFILE_INPUT" | tr '[:upper:]' '[:lower:]' | tr '-' '_')
          case "$PROFILE_INPUT" in
            daily) PROFILE="daily" ;;
            weekly|weekly_recap) PROFILE="weekly_recap" ;;
            *) echo "::error::Invalid profile: $PROFILE_INPUT"; exit 1 ;;
          esac
          echo "Generating ${PROFILE} draft for locale=$APR_LOCALE date=$RUN_DATE"
          mkdir -p .ci-logs
          LOG_FILE=".ci-logs/${APR_LOCALE}-${RUN_DATE}.log"
          MAX_ATTEMPTS=3
          ATTEMPT=0
          EXIT_CODE=1
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "=== Attempt $ATTEMPT/$MAX_ATTEMPTS ===" | tee -a "$LOG_FILE"
            set +e
            python scripts/generate_draft.py --date "$RUN_DATE" --profile "$PROFILE" 2>&1 | tee -a "$LOG_FILE"
            EXIT_CODE=${PIPESTATUS[0]}
            set -e
            if [ $EXIT_CODE -eq 0 ]; then
              echo "Draft generation succeeded on attempt $ATTEMPT" | tee -a "$LOG_FILE"
              break
            fi
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              TAIL=$(tail -30 "$LOG_FILE")
              if echo "$TAIL" | grep -qiE "(HTTP 429|HTTP 502|HTTP 503|HTTP 504|ConnectionError|TimeoutError|connection reset|rate limit|too many requests)"; then
                WAIT=$((ATTEMPT * 30))
                echo "Transient error — retrying in ${WAIT}s (attempt $ATTEMPT/$MAX_ATTEMPTS)" | tee -a "$LOG_FILE"
                sleep $WAIT
              else
                echo "::error::Permanent error on attempt $ATTEMPT — not retrying" | tee -a "$LOG_FILE"
                break
              fi
            fi
          done
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Draft generation failed after $ATTEMPT attempt(s)" | tee -a "$LOG_FILE"
            exit $EXIT_CODE
          fi

      - name: Commit draft state
        env:
          # Untrusted inputs reach the commit message via env, not interpolation.
          LOCALE: ${{ matrix.locale }}
          RUN_DATE_INPUT: ${{ github.event.inputs.run_date }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull any commits made by prior matrix jobs (e.g. EN when FR is running).
          # --autostash because the pipeline may have modified tracked files
          # (e.g. data/state/episode_history_{locale}.json) before this step.
          git pull --rebase --autostash origin main
          # Fail-safe: on 2026-04-16 an autostash pop silently left conflict
          # markers (<<<<<<< / ======= / >>>>>>>) in data/state/*.json, they
          # got committed as-is, and the next day's pipeline crashed with
          # JSONDecodeError. Refuse to commit any file that still contains
          # markers so we surface the merge instead of shipping broken state.
          if git grep -l -E '^(<<<<<<< |=======$|>>>>>>> )' -- data/state/ data/sources/ docs/ 2>/dev/null; then
            echo "::error::Unresolved conflict markers in staged paths — refusing to commit"
            git status
            exit 1
          fi
          git add -f data/state/ data/sources/ docs/
          MSG_DATE="${RUN_DATE_INPUT:-auto}"
          git diff --cached --quiet || git commit -m "draft: daily episode ${LOCALE} ${MSG_DATE} [skip ci]"
          # Retry on push race (another matrix job / approve-release may have pushed).
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "push rejected — rebasing (attempt $attempt)"
            git pull --rebase origin main
          done
          echo "::error::push failed after 3 rebase attempts"
          exit 1

      - name: Notify — create GitHub release for new episode
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(python - <<'PYEOF'
          import json, pathlib
          h = pathlib.Path('data/state/episode_history.json')
          if h.exists():
              eps = json.loads(h.read_text()).get('episodes', [])
              if eps:
                  print(eps[0].get('title', 'New episode'))
                  exit()
          print('New episode')
          PYEOF
          )
          DATE=$(date -u +%Y-%m-%d)
          TAG="episode-${DATE}-en"
          # Delete old tag if it exists (same-day re-run)
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "📻 $TITLE" \
            --notes "New episode published: $TITLE" \
            --latest=false \
            --prerelease

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-draft-output-${{ matrix.locale }}
          path: |
            output/
            .ci-logs/
          retention-days: 7
