name: Daily Generate

# Genere l'episode quotidien Lun-Ven a 5h45 Paris (3h45 UTC ete / 4h45 UTC hiver)
# Le podcast publie a 7h Paris — le run demarre a 5h45 pour laisser ~1h15
# de marge avant le drop (debugging, re-run TTS, approbation manuelle si besoin).
# Matrix: genere EN puis FR en serie (max-parallel: 1) pour eviter les races
# sur git push. Chaque locale ecrit son propre state (episode_history_{en,fr}.json),
# ses propres pages (docs/ vs docs/fr/) et son propre prefixe audio R2.
# L'audio est uploade sur R2 pour ecoute preview.
# Le feed RSS n'est PAS mis a jour — voir auto-release.yml

on:
  schedule:
    - cron: '45 3 * * 1-5'   # 5h45 Paris CEST (ajuster a '45 4' en hiver si besoin)
  workflow_dispatch:
    inputs:
      run_date:
        description: Run date (YYYY-MM-DD)
        required: false
        default: ''
      locale:
        description: Locale to run (leave empty for all enabled, or 'en'/'fr')
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false       # FR doit tourner meme si EN casse
      max-parallel: 1        # serialise les git push pour eviter les races
      matrix:
        # Filter the matrix itself so non-selected locales never spawn a job.
        # Earlier attempt used an `exit 0` step body, which only exits that
        # one step — the rest of the job (ffmpeg, pytest, Chromium, LLM, TTS)
        # still ran and committed unwanted drafts on manual single-locale
        # dispatches. Narrowing the expansion here is the correct fix:
        # dispatch with locale=fr → ["fr"]; schedule / empty → ["en","fr"].
        # `matrix.locale` is not available in `jobs.<id>.if`, but
        # `github.event.inputs` IS available in `jobs.<id>.strategy`.
        locale: ${{ fromJSON(github.event.inputs.locale != '' && format('["{0}"]', github.event.inputs.locale) || '["en","fr"]') }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main           # toujours partir de main pour cumuler EN puis FR

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Install Chromium for crawler
        run: python -m playwright install chromium

      - name: Generate daily draft
        env:
          # Locale selector — drives load_settings() + state file suffix
          APR_LOCALE: ${{ matrix.locale }}
          PODCAST_DESCRIPTION_LONG: ${{ vars.PODCAST_DESCRIPTION_LONG }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_EDITOR_MODEL: ${{ vars.LLM_EDITOR_MODEL }}
          LLM_FALLBACK_MODEL: ${{ vars.LLM_FALLBACK_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
          # Both voice IDs are passed — settings._apply_locale picks the right
          # one via voice_id_env in podcast.yaml (CARTESIA_VOICE_ID for EN,
          # CARTESIA_VOICE_ID_FR for FR).
          CARTESIA_VOICE_ID: ${{ vars.CARTESIA_VOICE_ID }}
          CARTESIA_VOICE_ID_FR: ${{ vars.CARTESIA_VOICE_ID_FR }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
        run: |
          set -e
          RUN_DATE=${{ github.event.inputs.run_date }}
          if [ -z "$RUN_DATE" ]; then RUN_DATE=$(date +%F); fi
          echo "Generating daily draft for locale=$APR_LOCALE date=$RUN_DATE"
          python scripts/generate_draft.py --date "$RUN_DATE" --profile daily

      - name: Commit draft state
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull any commits made by prior matrix jobs (e.g. EN when FR is running).
          # --autostash because the pipeline may have modified tracked files
          # (e.g. data/state/episode_history_{locale}.json) before this step.
          git pull --rebase --autostash origin main
          git add -f data/state/ data/sources/ docs/
          git diff --cached --quiet || git commit -m "draft: daily episode ${{ matrix.locale }} ${{ github.event.inputs.run_date || 'auto' }} [skip ci]"
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-draft-output-${{ matrix.locale }}
          path: output/
          retention-days: 7
