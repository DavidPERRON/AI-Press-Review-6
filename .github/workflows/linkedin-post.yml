name: Publier sur LinkedIn

on:
  # Déclenché automatiquement après chaque run de "Approuver et publier"
  workflow_run:
    workflows: ["Approuver et publier"]
    types: [completed]

  # Bouton manuel — pour forcer un post ou rejouer
  workflow_dispatch:
    inputs:
      force:
        description: 'Forcer même si épisode > 48h (oui/non)'
        required: false
        default: 'non'
        type: choice
        options:
          - non
          - oui

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # En mode workflow_run : ne tourne que si approve-release a réussi
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Post épisode sur LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          FORCE_LINKEDIN: ${{ inputs.force || 'non' }}
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import json, os, sys
          from datetime import datetime, timezone, timedelta
          from email.utils import parsedate_to_datetime
          import urllib.request, urllib.error

          # Version LinkedIn : mois précédent, toujours actif
          _now = datetime.now(timezone.utc)
          _y, _m = (_now.year, _now.month - 1) if _now.month > 1 else (_now.year - 1, 12)
          LINKEDIN_VERSION = f'{_y}{_m:02d}'

          token = os.environ.get('LINKEDIN_ACCESS_TOKEN', '')
          if not token:
              print("LINKEDIN_ACCESS_TOKEN manquant — skip")
              sys.exit(0)

          force = os.environ.get('FORCE_LINKEDIN', 'non').strip().lower() == 'oui'

          tree = ET.parse('docs/social-feed.xml')
          channel = tree.getroot().find('channel')
          items = channel.findall('item')
          if not items:
              print("Feed vide — skip")
              sys.exit(0)

          item = items[0]
          title        = item.findtext('title') or ''
          episode_url  = item.findtext('link') or ''
          raw_desc     = item.findtext('description') or title
          pub_date_str = item.findtext('pubDate') or ''

          # Format: title / summary (intro only, skip voice-note) / episode URL
          # The description stored in the feed is "voice_note\n\nintro" for most
          # episodes. Strip the voice-note prefix so LinkedIn readers see the
          # actual news summary, not the AI-voice disclaimer.
          _VOICE_NOTE_ENDINGS = [
              "The algorithm had opinions.",
              "Vos retours m'intéressent.",
          ]
          summary = raw_desc
          if '\n\n' in raw_desc:
              parts = raw_desc.split('\n\n', 1)
              # First part is voice note if it ends with a known marker
              if any(parts[0].rstrip().endswith(e) for e in _VOICE_NOTE_ENDINGS):
                  summary = parts[1].strip()
          else:
              for ending in _VOICE_NOTE_ENDINGS:
                  idx = raw_desc.find(ending)
                  if idx != -1:
                      summary = raw_desc[idx + len(ending):].strip()
                      break

          description = f"{title}\n\n{summary}\n\n{episode_url}" if episode_url else f"{title}\n\n{summary}"

          # Garde d'âge — ignorée si force=oui
          if pub_date_str and not force:
              try:
                  pub_dt = parsedate_to_datetime(pub_date_str)
                  age = datetime.now(timezone.utc) - pub_dt
                  if age > timedelta(hours=48):
                      print(f"Episode trop ancien ({age}) — skip")
                      sys.exit(0)
              except Exception as e:
                  print(f"Erreur date : {e}")

          req = urllib.request.Request(
              'https://api.linkedin.com/v2/userinfo',
              headers={'Authorization': f'Bearer {token}'}
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  profile = json.loads(resp.read())
              person_urn = f"urn:li:person:{profile['sub']}"
          except urllib.error.HTTPError as e:
              print(f"Erreur profil : {e.code} — {e.read().decode()}")
              sys.exit(1)

          print(f"Compte : {person_urn}")
          print(f"Episode : {title}")
          print(f"LinkedIn-Version : {LINKEDIN_VERSION}")

          # ── Upload banner image ────────────────────────────────────────
          banner_path = 'docs/assets/og-banner.png'
          image_urn = None
          if os.path.exists(banner_path):
              try:
                  # 1. Initialize upload
                  init_data = json.dumps({
                      "initializeUploadRequest": {"owner": person_urn}
                  }).encode()
                  req = urllib.request.Request(
                      'https://api.linkedin.com/v2/images?action=initializeUpload',
                      data=init_data,
                      headers={
                          'Authorization': f'Bearer {token}',
                          'Content-Type': 'application/json',
                          'LinkedIn-Version': LINKEDIN_VERSION,
                          'X-Restli-Protocol-Version': '2.0.0',
                      },
                      method='POST',
                  )
                  with urllib.request.urlopen(req) as resp:
                      upload_info = json.loads(resp.read())
                  upload_url = upload_info['value']['uploadUrl']
                  image_urn  = upload_info['value']['image']

                  # 2. Upload binary
                  with open(banner_path, 'rb') as f:
                      img_bytes = f.read()
                  req = urllib.request.Request(
                      upload_url,
                      data=img_bytes,
                      headers={'Authorization': f'Bearer {token}',
                               'Content-Type': 'application/octet-stream'},
                      method='PUT',
                  )
                  with urllib.request.urlopen(req) as resp:
                      pass
                  print(f"Banner uploadé : {image_urn}")
              except Exception as e:
                  print(f"Upload banner échoué ({e}) — post sans image")
                  image_urn = None

          # ── Build post payload ─────────────────────────────────────────
          post_body = {
              "author": person_urn,
              "commentary": description[:3000],
              "visibility": "PUBLIC",
              "distribution": {
                  "feedDistribution": "MAIN_FEED",
                  "targetEntities": [],
                  "thirdPartyDistributionChannels": []
              },
              "lifecycleState": "PUBLISHED",
          }
          if image_urn:
              post_body["content"] = {
                  "media": {
                      "altText": title,
                      "id": image_urn,
                  }
              }

          post_data = json.dumps(post_body).encode()
          req = urllib.request.Request(
              'https://api.linkedin.com/rest/posts',
              data=post_data,
              headers={
                  'Authorization': f'Bearer {token}',
                  'Content-Type': 'application/json',
                  'LinkedIn-Version': LINKEDIN_VERSION,
                  'X-Restli-Protocol-Version': '2.0.0'
              },
              method='POST'
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Publié sur LinkedIn : HTTP {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"Echec : {e.code} — {e.read().decode()}")
              sys.exit(1)
          PYEOF
