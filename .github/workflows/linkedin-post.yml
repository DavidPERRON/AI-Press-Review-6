name: Post LinkedIn

on:
  workflow_run:
    workflows: ["Approuver et publier"]
    types: [completed]
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Post latest episode to LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import json, os, sys
          from datetime import datetime, timezone, timedelta
          from email.utils import parsedate_to_datetime
          import urllib.request, urllib.error

          token = os.environ.get('LINKEDIN_ACCESS_TOKEN', '')
          if not token:
              print("LINKEDIN_ACCESS_TOKEN manquant")
              sys.exit(1)

          # Lire le feed social
          tree = ET.parse('docs/social-feed.xml')
          channel = tree.getroot().find('channel')
          items = channel.findall('item')
          if not items:
              print("Feed vide")
              sys.exit(0)

          item = items[0]
          guid        = item.findtext('guid') or ''
          title       = item.findtext('title') or ''
          description = item.findtext('description') or title
          pub_date_str = item.findtext('pubDate') or ''

          # Ne poster que si l'épisode date de moins de 48h
          if pub_date_str:
              try:
                  pub_dt = parsedate_to_datetime(pub_date_str)
                  age = datetime.now(timezone.utc) - pub_dt
                  if age > timedelta(hours=48):
                      print(f"Épisode trop ancien ({age}), skip")
                      sys.exit(0)
              except Exception as e:
                  print(f"Erreur de date : {e}")

          # Récupérer le person URN
          req = urllib.request.Request(
              'https://api.linkedin.com/v2/me',
              headers={
                  'Authorization': f'Bearer {token}',
                  'X-Restli-Protocol-Version': '2.0.0'
              }
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  profile = json.loads(resp.read())
              person_urn = f"urn:li:person:{profile['id']}"
          except urllib.error.HTTPError as e:
              print(f"Erreur profil LinkedIn : {e.code} — {e.read().decode()}")
              sys.exit(1)

          print(f"Compte : {person_urn}")
          print(f"Épisode : {title}")

          # Publier le post
          post_data = json.dumps({
              "author": person_urn,
              "commentary": description[:3000],
              "visibility": "PUBLIC",
              "distribution": {
                  "feedDistribution": "MAIN_FEED",
                  "targetEntities": [],
                  "thirdPartyDistributionChannels": []
              },
              "lifecycleState": "PUBLISHED",
              "isReshareDisableForOperator": False
          }).encode()

          req = urllib.request.Request(
              'https://api.linkedin.com/rest/posts',
              data=post_data,
              headers={
                  'Authorization': f'Bearer {token}',
                  'Content-Type': 'application/json',
                  'LinkedIn-Version': '202311',
                  'X-Restli-Protocol-Version': '2.0.0'
              },
              method='POST'
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"✓ Publié : HTTP {resp.status}")
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"✗ Échec : {e.code} — {body}")
              sys.exit(1)
          PYEOF
