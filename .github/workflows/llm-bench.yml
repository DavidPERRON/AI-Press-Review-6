name: LLM Bench

# Run editorial generation against a configurable list of LLM models on
# the same sources manifest. No TTS, no upload. Produces comparison
# artifact for manual selection of primary + fallback models.

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: 'Run date (YYYY-MM-DD). Empty = today.'
        required: false
        default: ''
      profile:
        description: 'Editorial profile (daily, weekly_recap)'
        required: false
        default: 'daily'
      models:
        description: 'Comma-separated model IDs to bench'
        required: false
        default: 'google/gemini-2.5-flash,openai/gpt-4o-mini,anthropic/claude-3.5-haiku,deepseek/deepseek-chat,mistralai/mistral-medium-3'
      reuse_manifest:
        description: 'Reuse the on-disk latest sources manifest if present'
        required: false
        default: 'true'

permissions:
  contents: read

concurrency:
  group: llm-bench
  cancel-in-progress: false

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Install Chromium for crawler
        run: python -m playwright install chromium

      - name: Run LLM bench
        env:
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
          # Intentionally do NOT pass LLM_EDITOR_MODEL / FALLBACK — the script
          # overrides per-model and neutralises the fallback during the run.
          # Untrusted workflow inputs — consumed via env, never interpolated
          # straight into the shell script body.
          RUN_DATE_INPUT: ${{ github.event.inputs.run_date }}
          PROFILE_INPUT: ${{ github.event.inputs.profile }}
          MODELS_INPUT: ${{ github.event.inputs.models }}
          REUSE_INPUT: ${{ github.event.inputs.reuse_manifest }}
        run: |
          set -e
          RUN_DATE="${RUN_DATE_INPUT}"
          if [ -z "$RUN_DATE" ]; then RUN_DATE=$(date +%F); fi
          if ! [[ "$RUN_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::Invalid run_date format: $RUN_DATE (expected YYYY-MM-DD)"
            exit 1
          fi
          case "$PROFILE_INPUT" in
            daily|weekly_recap) PROFILE="$PROFILE_INPUT" ;;
            *) echo "::error::Invalid profile: $PROFILE_INPUT"; exit 1 ;;
          esac
          # Models list: must match OpenRouter slug shape (provider/name with
          # dots, dashes, digits, colons) separated by commas.
          if ! [[ "$MODELS_INPUT" =~ ^[A-Za-z0-9._/:,-]+$ ]]; then
            echo "::error::Invalid models list: $MODELS_INPUT"
            exit 1
          fi
          REUSE_FLAG=""
          if [ "$REUSE_INPUT" != "true" ]; then
            REUSE_FLAG="--fresh-manifest"
          fi
          python scripts/bench_llm.py \
            --date "$RUN_DATE" \
            --profile "$PROFILE" \
            --models "$MODELS_INPUT" \
            $REUSE_FLAG

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: llm-bench-results
          path: |
            output/bench/
          retention-days: 14
