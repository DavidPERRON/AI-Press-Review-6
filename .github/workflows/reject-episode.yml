name: Reject Episode

# Declenchement manuel pour rejeter le draft en attente pour une locale donnee.
# Supprime l'audio de R2 et marque le draft comme rejete dans
# data/state/pending_draft_{locale}.json (ou pending_draft.json pour l'ancienne
# locale unique EN sans suffixe).

on:
  workflow_dispatch:
    inputs:
      locale:
        description: Locale whose pending draft to reject (en or fr)
        required: true
        default: 'en'
        type: choice
        options:
          - en
          - fr

permissions:
  contents: write

jobs:
  reject:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Pull latest state
        run: git pull --rebase origin main

      - name: Reject pending draft
        env:
          # APR_LOCALE drives _locale_suffix() in state.py so the script
          # reads/writes pending_draft_en.json or pending_draft_fr.json
          # (not the legacy suffix-less file).
          APR_LOCALE: ${{ inputs.locale }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python scripts/reject_draft.py

      - name: Commit rejection state
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state/
          git diff --cached --quiet || git commit -m "reject: episode rejected [skip ci]"
          git push
