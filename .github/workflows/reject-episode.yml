name: Rejeter le brouillon

# Declenchement manuel pour rejeter le draft en attente pour une locale donnee.
# Supprime l'audio de R2 et marque le draft comme rejete dans
# data/state/pending_draft_{locale}.json (ou pending_draft.json pour l'ancienne
# locale unique EN sans suffixe).

on:
  workflow_dispatch:
    inputs:
      locale:
        description: Locale whose pending draft to reject (en or fr)
        required: true
        default: 'en'
        type: choice
        options:
          - en
          - fr

permissions:
  contents: write

# Reject runs must not race with approve-release — both touch
# data/state/pending_draft_{locale}.json. Cheaper to queue rejects globally
# (rare event) than to try coordinating with approve.
concurrency:
  group: release-workflow
  cancel-in-progress: false

jobs:
  reject:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Pull latest state
        run: git pull --rebase origin main

      - name: Reject pending draft
        env:
          # APR_LOCALE drives _locale_suffix() in state.py so the script
          # reads/writes pending_draft_en.json or pending_draft_fr.json
          # (not the legacy suffix-less file).
          APR_LOCALE: ${{ inputs.locale }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python scripts/reject_draft.py

      - name: Commit rejection state
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Rebase-pull in case approve-release or a daily draft committed
          # to main between checkout and now. Same retry loop as the other
          # write-to-main workflows; reject used to `git push` straight and
          # fail on any race.
          git pull --rebase --autostash origin main
          git add data/state/
          git diff --cached --quiet || git commit -m "reject: episode rejected [skip ci]"
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "push rejected — rebasing (attempt $attempt)"
            git pull --rebase origin main
          done
          echo "::error::push failed after 3 rebase attempts"
          exit 1
