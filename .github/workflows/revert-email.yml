name: Revert email (gmx → aequitus)

# One-shot workflow: reverts the temporary david.perron@gmx.fr swap back to
# david.perron@aequitus.net at 18:00 Paris on 2026-04-14 (16:00 UTC in CEST).
#
# After reverting, the workflow deletes itself so it never fires again.
# The date guard below prevents any mis-fire if GH cron retriggers this cron
# expression in future years (cron is pattern-based, no end date).
#
# Also available via workflow_dispatch for manual trigger if cron is missed.

on:
  schedule:
    - cron: '0 16 14 4 *'   # 16:00 UTC on April 14 = 18:00 Paris (CEST)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: revert-email
  cancel-in-progress: false

jobs:
  revert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Date guard (only run on 2026-04-14)
        id: guard
        run: |
          today=$(date -u +%Y-%m-%d)
          if [ "$today" != "2026-04-14" ]; then
            echo "Not 2026-04-14 (today=$today) — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Revert email everywhere
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -e
          python3 - <<'PY'
          import pathlib
          targets = [
              "config/podcast.yaml",
              "src/ai_press_review/publish/templates/episode-brief-template.html",
              "src/ai_press_review/publish/templates/index-template.html",
              "docs/podcast-feed.xml",
              "docs/feed.xsl",
              "docs/about.html",
              "docs/index.html",
          ]
          # Any episode HTML files that might have been generated with the temp email
          for p in pathlib.Path("docs/episodes").glob("*.html"):
              targets.append(str(p))
          old = "david.perron@gmx.fr"
          new = "david.perron@aequitus.net"
          total = 0
          for rel in targets:
              p = pathlib.Path(rel)
              if not p.exists():
                  continue
              text = p.read_text(encoding="utf-8")
              count = text.count(old)
              if count == 0:
                  continue
              p.write_text(text.replace(old, new), encoding="utf-8")
              print(f"PATCH  {rel}: {count} replacement(s)")
              total += count
          # Clean the temporary comment block in config/podcast.yaml so the YAML goes
          # back to its pristine pre-swap state.
          yaml_path = pathlib.Path("config/podcast.yaml")
          if yaml_path.exists():
              text = yaml_path.read_text(encoding="utf-8")
              marker_start = "# TEMPORARY (2026-04-14): gmx.fr inbox"
              if marker_start in text:
                  lines = text.splitlines(keepends=True)
                  cleaned = []
                  skip = False
                  for line in lines:
                      if not skip and line.lstrip().startswith(marker_start):
                          skip = True
                          continue
                      if skip and line.lstrip().startswith("#"):
                          continue
                      skip = False
                      cleaned.append(line)
                  yaml_path.write_text("".join(cleaned), encoding="utf-8")
                  print("PATCH  config/podcast.yaml: removed temporary comment block")
          print(f"Total replacements: {total}")
          PY

      - name: Refresh feed lastBuildDate (touch)
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -e
          python3 - <<'PY'
          import re, pathlib
          from datetime import datetime, timezone
          from email.utils import format_datetime
          now = format_datetime(datetime.now(timezone.utc))
          p = pathlib.Path("docs/podcast-feed.xml")
          text = p.read_text(encoding="utf-8")
          new_text, n = re.subn(
              r"<lastBuildDate>[^<]*</lastBuildDate>",
              f"<lastBuildDate>{now}</lastBuildDate>",
              text,
              count=1,
          )
          if n == 1:
              p.write_text(new_text, encoding="utf-8")
              print(f"Refreshed lastBuildDate to {now}")
          else:
              print("No lastBuildDate found to refresh — skipping.")
          PY

      - name: Self-delete workflow
        if: steps.guard.outputs.skip != 'true'
        run: |
          rm -f .github/workflows/revert-email.yml
          echo "Workflow file removed — will not fire again."

      - name: Commit + push
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: revert temp email to aequitus + remove one-shot workflow [skip ci]"
          git push
