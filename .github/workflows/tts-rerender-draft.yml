name: Resynthétiser l'audio

# Re-synthesise the audio for an existing pending draft without re-crawling
# or re-running the LLM.  Pulls script.txt from a prior daily-generate artifact,
# renders it with the current TTS config (new voice settings, chunk mode, speed,
# acronym table, sentence-length cap), uploads the new MP3 to R2 under the same
# key (overwriting the old audio at the same URL), and updates the pending draft
# state so approve-release sees the refreshed audio metadata.
#
# Usage:
#   gh workflow run tts-rerender-draft.yml \
#     -f source_run_id=<daily-generate run ID> \
#     -f locale=fr

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'daily-generate run ID to pull script.txt from (see Actions history)'
        required: true
      locale:
        description: 'Locale (en | fr)'
        required: true
        default: 'fr'
        type: choice
        options:
          - en
          - fr

permissions:
  contents: write
  actions: read   # required for gh run download on a prior run

jobs:
  rerender:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Pin to main so the re-render uses the exact same code as daily-generate.
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Download script.txt from prior run artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          LOCALE="${{ github.event.inputs.locale }}"
          RUN_ID="${{ github.event.inputs.source_run_id }}"
          ARTIFACT_NAME="daily-draft-output-${LOCALE}"
          echo "Pulling artifact ${ARTIFACT_NAME} from run ${RUN_ID}"
          mkdir -p /tmp/src
          gh run download "${RUN_ID}" --name "${ARTIFACT_NAME}" --dir /tmp/src
          SCRIPT_PATH=$(find /tmp/src -name 'script.txt' | head -1)
          if [ -z "${SCRIPT_PATH}" ]; then
            echo "ERROR: script.txt not found in artifact"
            ls -laR /tmp/src
            exit 1
          fi
          cp "${SCRIPT_PATH}" /tmp/script.txt
          echo "Script: $(wc -w < /tmp/script.txt) words"

      - name: Pull latest state before re-render
        run: git pull --rebase --autostash origin main

      - name: Re-render TTS, upload to R2, update pending draft
        env:
          APR_LOCALE: ${{ github.event.inputs.locale }}
          CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY || secrets.CARESTIA_API_KEY }}
          CARTESIA_VOICE_ID: ${{ vars.CARTESIA_VOICE_ID }}
          CARTESIA_VOICE_ID_FR: ${{ vars.CARTESIA_VOICE_ID_FR }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          # LLM key not needed for TTS-only — empty string satisfies settings
          # validation ("LLM_API_KEY not set" is only a warning, not an error).
          # LLM_BASE_URL must NOT be set (or must be empty) — the hostname
          # whitelist validator raises ValueError on non-empty unknown values.
          LLM_API_KEY: ''
          LLM_BASE_URL: ''
        run: python scripts/rerender_draft_tts.py --script /tmp/script.txt

      - name: Commit updated pending draft state
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add data/state/pending_draft*.json
          git diff --cached --quiet || git commit -m "tts-rerender: refresh ${{ github.event.inputs.locale }} audio [skip ci]"
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "push rejected — rebasing (attempt $attempt)"
            git pull --rebase --autostash origin main
          done
          echo "::error::push failed after 3 attempts"
          exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tts-rerender-${{ github.event.inputs.locale }}
          path: output/rerender/
          retention-days: 14
