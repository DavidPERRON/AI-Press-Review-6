name: Test voix TTS

# Synthétise un court passage texte avec les paramètres TTS actuels et
# uploade l'audio sur R2 sous audio-test/voice-test-{locale}.mp3.
# Durée typique : 2-3 minutes. Utile pour valider speed/emotion/acronymes
# sans lancer un épisode complet.
#
# Usage :
#   gh workflow run tts-voice-test.yml -f locale=fr \
#     -f text="Bienvenue dans la Revue de Presse IA. Aujourd'hui, les LLM d'OpenAI..."

on:
  workflow_dispatch:
    inputs:
      locale:
        description: 'Locale (fr | en)'
        required: true
        default: 'fr'
        type: choice
        options:
          - fr
          - en
      text:
        description: 'Texte à synthétiser (300 car. conseillés, 2000 max)'
        required: false
        default: ""
      voice_id_override:
        description: 'Override voice ID (leave blank to use the variable for the selected locale)'
        required: false
        default: ""

permissions:
  contents: read

jobs:
  test-tts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Render test audio
        env:
          APR_LOCALE: ${{ inputs.locale }}
          CARTESIA_API_KEY: ${{ secrets.APR_TEST_CARTESIA_API_KEY || secrets.APR_TEST_CARESTIA_API_KEY || secrets.CARTESIA_API_KEY || secrets.CARESTIA_API_KEY }}
          CARTESIA_VOICE_ID: ${{ inputs.voice_id_override != '' && inputs.voice_id_override || vars.CARTESIA_VOICE_ID }}
          CARTESIA_VOICE_ID_FR: ${{ inputs.voice_id_override != '' && inputs.voice_id_override || vars.CARTESIA_VOICE_ID_FR }}
          TEST_TEXT: ${{ inputs.text != '' && inputs.text || (inputs.locale == 'en' && 'Welcome to the AI Press Review. Today, OpenAI unveiled a new multimodal LLM that rivals the best NVIDIA GPUs on MMLU and GPQA benchmarks. The CEO of a French startup announced a funding round, while AGI remains at the heart of debates among Silicon Valley executives. MCP APIs are becoming the standard, and AI industry KPIs confirm massive B2B adoption.' || 'Bienvenue dans la Revue de Presse IA. Aujourd hui, OpenAI a dévoilé un nouveau LLM multimodal qui rivalise avec les meilleurs GPU de NVIDIA sur les benchmarks MMLU et GPQA. Le PDG de la startup française a annoncé une levée de fonds en IPO, tandis que l AGI reste au cœur des débats entre les CEO de la Silicon Valley. Les API de MCP s imposent comme standard, et les KPIs de l industrie IA confirment une adoption massive en B2B.') }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
        run: python scripts/tts_voice_test.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tts-voice-test-${{ inputs.locale }}
          path: output/tts-test/
          retention-days: 7
