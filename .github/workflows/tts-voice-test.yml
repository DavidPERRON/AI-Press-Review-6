name: Test voix TTS

# Synthétise un court passage texte avec les paramètres TTS actuels et
# uploade l'audio sur R2 sous audio-test/voice-test-{locale}.mp3.
# Durée typique : 2-3 minutes. Utile pour valider speed/emotion/acronymes
# sans lancer un épisode complet.
#
# Usage :
#   gh workflow run tts-voice-test.yml -f locale=fr \
#     -f text="Bienvenue dans la Revue de Presse IA. Aujourd'hui, les LLM d'OpenAI..."

on:
  workflow_dispatch:
    inputs:
      locale:
        description: 'Locale (fr | en)'
        required: true
        default: 'fr'
        type: choice
        options:
          - fr
          - en
      text:
        description: 'Texte à synthétiser (300 car. conseillés, 2000 max)'
        required: false
        default: >
          Bienvenue dans la Revue de Presse IA.
          Aujourd'hui, OpenAI a dévoilé un nouveau LLM multimodal qui rivalise avec
          les meilleurs GPU de NVIDIA sur les benchmarks MMLU et GPQA.
          Le PDG de la startup française a annoncé une levée de fonds en IPO,
          tandis que l'AGI reste au cœur des débats entre les CEO de la Silicon Valley.
          Les API de MCP s'imposent comme standard, et les KPIs de l'industrie IA
          confirment une adoption massive en B2B.

permissions:
  contents: read

jobs:
  test-tts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Render test audio
        env:
          APR_LOCALE: ${{ inputs.locale }}
          CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY || secrets.CARESTIA_API_KEY }}
          CARTESIA_VOICE_ID: ${{ vars.CARTESIA_VOICE_ID }}
          CARTESIA_VOICE_ID_FR: ${{ vars.CARTESIA_VOICE_ID_FR }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          TEST_TEXT: ${{ inputs.text }}
        run: python scripts/tts_voice_test.py

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: tts-voice-test-${{ inputs.locale }}
          path: output/tts-test/
          retention-days: 7
