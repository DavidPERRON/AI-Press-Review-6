name: Test voix TTS

on:
  workflow_dispatch:
    inputs:
      locale:
        description: 'Locale'
        required: true
        default: 'en'
        type: choice
        options:
          - en
          - fr
      speed:
        description: 'Vitesse (0.85 / 0.90 / 0.95 / 1.0)'
        required: false
        default: "0.95"
      emotion:
        description: 'Emotion Cartesia'
        required: false
        default: "positivity:highest"
        type: choice
        options:
          - excited
          - positivity:high
          - positivity:highest
          - anger:low
          - curiosity:high
      text:
        description: 'Texte à synthétiser (laisser vide = extrait par défaut)'
        required: false
        default: ""

permissions:
  contents: read

jobs:
  test-tts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Render test audio
        env:
          APR_LOCALE: ${{ inputs.locale }}
          CARTESIA_API_KEY: ${{ secrets.APR_TEST_CARTESIA_API_KEY || secrets.APR_TEST_CARESTIA_API_KEY || secrets.CARTESIA_API_KEY || secrets.CARESTIA_API_KEY }}
          CARTESIA_VOICE_ID: ${{ vars.CARTESIA_VOICE_ID }}
          CARTESIA_VOICE_ID_FR: ${{ vars.CARTESIA_VOICE_ID_FR }}
          TTS_SPEED_OVERRIDE: ${{ inputs.speed }}
          TTS_EMOTION_OVERRIDE: ${{ inputs.emotion }}
          TEST_TEXT: ${{ inputs.text != '' && inputs.text || (inputs.locale == 'en' && 'Synthetic in voice, genuine in substance. Now presented by an AI clone of your devoted host. And yes, the accent is... how you say... more French than the man himself. The algorithm had opinions.\n\nDeepSeek launched its V4 model at 97% below OpenAI''s GPT-5.5 pricing while simultaneously offering developers a 75% promotional discount, triggering a direct price war in enterprise AI APIs. Anthropic''s internal agent marketplace experiment closed every deal without human input in one week, providing the clearest real-world proof yet of fully autonomous commerce. CFOs should watch token-based consumption pricing closely — a new study shows agentic coding tasks consume up to 1,000 times more tokens than standard code chat, making cost forecasting a material finance risk.' || 'Bienvenue dans votre Revue de Presse IA hebdomadaire. Cette semaine, trois signaux ont dominé le paysage de l intelligence artificielle. Premièrement, DeepSeek V4 est tombé sans prévenir — un modèle de niveau frontier, poids ouverts, tournant à une fraction du coût de GPT-4o. Les implications pour la chaîne d approvisionnement GPU sont considérables. Deuxièmement, OpenAI a doublé la mise sur sa stratégie enterprise. Troisièmement, le marché de l emploi des programmeurs montre de vraies fissures — les données de LinkedIn et Stack Overflow confirment un glissement structurel, pas conjoncturel.') }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
        run: python scripts/tts_voice_test.py

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: voice-test-${{ inputs.locale }}-speed-${{ inputs.speed }}-${{ inputs.emotion }}
          path: output/tts-test/
          retention-days: 7
