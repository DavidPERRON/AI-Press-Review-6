name: Test voix TTS

on:
  workflow_dispatch:
    inputs:
      locale:
        description: 'Locale'
        required: true
        default: 'en'
        type: choice
        options:
          - en
          - fr
      speed:
        description: 'Vitesse (0.85 / 0.90 / 0.95 / 1.0)'
        required: false
        default: "0.85"
      text:
        description: 'Texte à synthétiser (laisser vide = extrait par défaut)'
        required: false
        default: ""

permissions:
  contents: read

jobs:
  test-tts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Render test audio
        env:
          APR_LOCALE: ${{ inputs.locale }}
          CARTESIA_API_KEY: ${{ secrets.APR_TEST_CARTESIA_API_KEY || secrets.APR_TEST_CARESTIA_API_KEY || secrets.CARTESIA_API_KEY || secrets.CARESTIA_API_KEY }}
          CARTESIA_VOICE_ID: ${{ vars.CARTESIA_VOICE_ID }}
          CARTESIA_VOICE_ID_FR: ${{ vars.CARTESIA_VOICE_ID_FR }}
          TTS_SPEED_OVERRIDE: ${{ inputs.speed }}
          TEST_TEXT: ${{ inputs.text != '' && inputs.text || (inputs.locale == 'en' && 'Your Weekly AI Press Review. This week, three signals dominated the AI landscape. First, DeepSeek V4 dropped without warning — a frontier-class model, open weights, running at a fraction of the cost of GPT-4o. The implications for the GPU supply chain are significant. Second, OpenAI doubled down on its enterprise strategy, announcing deeper Microsoft integrations and a new tier aimed at Fortune 500 procurement teams. Third, the programmer job market is showing real cracks — hiring data from LinkedIn and Stack Overflow confirms a structural shift, not a cyclical one. These three stories are connected, and that connection is the story of this week.' || 'Bienvenue dans votre Revue de Presse IA hebdomadaire. Cette semaine, trois signaux ont dominé le paysage de l intelligence artificielle. Premièrement, DeepSeek V4 est tombé sans prévenir — un modèle de niveau frontier, poids ouverts, tournant à une fraction du coût de GPT-4o. Les implications pour la chaîne d approvisionnement GPU sont considérables. Deuxièmement, OpenAI a doublé la mise sur sa stratégie enterprise. Troisièmement, le marché de l emploi des programmeurs montre de vraies fissures — les données de LinkedIn et Stack Overflow confirment un glissement structurel, pas conjoncturel.') }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
        run: python scripts/tts_voice_test.py

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: voice-test-${{ inputs.locale }}-speed-${{ inputs.speed }}
          path: output/tts-test/
          retention-days: 7
