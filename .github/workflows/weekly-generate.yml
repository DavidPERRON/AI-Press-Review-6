name: Weekly Generate

# Genere le recap hebdomadaire le Samedi a 6h Paris
# Matrix: genere EN puis FR en serie (max-parallel: 1) pour eviter les races
# sur git push. Chaque locale ecrit son propre state (episode_history_{en,fr}.json)
# et ses propres pages (docs/ vs docs/fr/).
# Conserve le buzz de la semaine + ouvre aux infos non utilisees.
# L'audio est uploade sur R2 pour ecoute preview.

on:
  schedule:
    - cron: '0 4 * * 6'   # Samedi 6h Paris CEST
  workflow_dispatch:
    inputs:
      run_date:
        description: Run date (YYYY-MM-DD)
        required: false
        default: ''
      locale:
        description: Locale to run (leave empty for all enabled, or 'en'/'fr')
        required: false
        default: ''

permissions:
  contents: write

# Serialize two runs of weekly-generate on the same ref (scheduled Saturday
# run vs. manual re-run). Queue, don't cancel — see daily-generate.yml.
concurrency:
  group: weekly-generate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        # Filter the matrix itself so non-selected locales never spawn a job.
        # See daily-generate.yml for the long explanation; same bug, same fix.
        locale: ${{ fromJSON(github.event.inputs.locale != '' && format('["{0}"]', github.event.inputs.locale) || '["en","fr"]') }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Install Chromium for crawler
        run: python -m playwright install chromium

      - name: Generate weekly recap draft
        env:
          APR_LOCALE: ${{ matrix.locale }}
          PODCAST_DESCRIPTION_LONG: ${{ vars.PODCAST_DESCRIPTION_LONG }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          # Generic model vars — used when no per-locale override is set.
          LLM_EDITOR_MODEL: ${{ vars.LLM_EDITOR_MODEL }}
          LLM_FALLBACK_MODEL: ${{ vars.LLM_FALLBACK_MODEL }}
          # Optional 3rd cascade tier — see daily-generate.yml for rationale.
          LLM_EMERGENCY_MODEL: ${{ vars.LLM_EMERGENCY_MODEL }}
          # Per-locale model overrides — see daily-generate.yml. Same vars,
          # same logic: settings._apply_locale() switches the editor/fallback
          # based on APR_LOCALE so EN and FR can run on different downstream
          # models from one OpenRouter API key.
          LLM_EDITOR_MODEL_EN: ${{ vars.LLM_EDITOR_MODEL_EN }}
          LLM_FALLBACK_MODEL_EN: ${{ vars.LLM_FALLBACK_MODEL_EN }}
          LLM_EMERGENCY_MODEL_EN: ${{ vars.LLM_EMERGENCY_MODEL_EN }}
          LLM_EDITOR_MODEL_FR: ${{ vars.LLM_EDITOR_MODEL_FR }}
          LLM_FALLBACK_MODEL_FR: ${{ vars.LLM_FALLBACK_MODEL_FR }}
          LLM_EMERGENCY_MODEL_FR: ${{ vars.LLM_EMERGENCY_MODEL_FR }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
          CARTESIA_VOICE_ID: ${{ vars.CARTESIA_VOICE_ID }}
          CARTESIA_VOICE_ID_FR: ${{ vars.CARTESIA_VOICE_ID_FR }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
          # Shell-injection hardening — see daily-generate.yml for the pattern.
          RUN_DATE_INPUT: ${{ github.event.inputs.run_date }}
        run: |
          set -e
          RUN_DATE="${RUN_DATE_INPUT}"
          if [ -z "$RUN_DATE" ]; then RUN_DATE=$(date +%F); fi
          if ! [[ "$RUN_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::Invalid run_date format: $RUN_DATE (expected YYYY-MM-DD)"
            exit 1
          fi
          echo "Generating weekly recap for locale=$APR_LOCALE date=$RUN_DATE"
          python scripts/generate_draft.py --date "$RUN_DATE" --profile weekly_recap

      - name: Commit draft state
        env:
          LOCALE: ${{ matrix.locale }}
          RUN_DATE_INPUT: ${{ github.event.inputs.run_date }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # --autostash because the pipeline may have modified tracked files
          # (e.g. data/state/episode_history_{locale}.json) before this step.
          git pull --rebase --autostash origin main
          # Same fail-safe as daily-generate — see that file for the 2026-04-16
          # incident report. Committing conflict markers bricks next run.
          if git grep -l -E '^(<<<<<<< |=======$|>>>>>>> )' -- data/state/ data/sources/ docs/ 2>/dev/null; then
            echo "::error::Unresolved conflict markers in staged paths — refusing to commit"
            git status
            exit 1
          fi
          git add -f data/state/ data/sources/ docs/
          MSG_DATE="${RUN_DATE_INPUT:-auto}"
          git diff --cached --quiet || git commit -m "draft: weekly recap ${LOCALE} ${MSG_DATE} [skip ci]"
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "push rejected — rebasing (attempt $attempt)"
            git pull --rebase origin main
          done
          echo "::error::push failed after 3 rebase attempts"
          exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-draft-output-${{ matrix.locale }}
          path: output/
          retention-days: 7
