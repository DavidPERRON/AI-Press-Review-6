name: Weekly Generate

# Genere le recap hebdomadaire le Samedi a 6h Paris
# Conserve le buzz de la semaine + ouvre aux infos non utilisees
# L'audio est uploade sur R2 pour ecoute preview

on:
  schedule:
    - cron: '0 4 * * 6'   # Samedi 6h Paris CEST
  workflow_dispatch:
    inputs:
      run_date:
        description: Run date (YYYY-MM-DD)
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Install Chromium for crawler
        run: python -m playwright install chromium

      - name: Generate weekly recap draft
        env:
          PODCAST_DESCRIPTION_LONG: ${{ vars.PODCAST_DESCRIPTION_LONG }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_EDITOR_MODEL: ${{ vars.LLM_EDITOR_MODEL }}
          LLM_FALLBACK_MODEL: ${{ vars.LLM_FALLBACK_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
          CARTESIA_VOICE_ID: ${{ vars.CARTESIA_VOICE_ID }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: |
          RUN_DATE=${{ github.event.inputs.run_date }}
          if [ -z "$RUN_DATE" ]; then RUN_DATE=$(date +%F); fi
          python scripts/generate_draft.py --date "$RUN_DATE" --profile weekly_recap

      - name: Commit draft state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/state/ data/sources/ docs/sources/
          git diff --cached --quiet || git commit -m "draft: weekly recap ${{ github.event.inputs.run_date || 'auto' }} [skip ci]"
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-draft-output
          path: output/
          retention-days: 7
