name: Générer — récap hebdo

# Genere le recap hebdomadaire le Samedi a 6h Paris
# Matrix: genere EN puis FR en serie (max-parallel: 1) pour eviter les races
# sur git push. Chaque locale ecrit son propre state (episode_history_{en,fr}.json)
# et ses propres pages (docs/ vs docs/fr/).
# Conserve le buzz de la semaine + ouvre aux infos non utilisees.
# L'audio est uploade sur R2 pour ecoute preview.

on:
  schedule:
    # See daily-generate.yml for the two-cron DST rationale. Target is 6h
    # Paris local on Saturday year-round. Month lists disjoint so only one
    # fires per Saturday.
    - cron: '0 4 * 4-10 6'        # 6h Paris CEST (Apr-Oct, UTC+2)
    - cron: '0 5 * 1-3,11,12 6'   # 6h Paris CET  (Nov-Mar, UTC+1)
  workflow_dispatch:
    inputs:
      run_date:
        description: Run date (JJ/MM/AA, e.g. 18/04/26)
        required: false
        default: ''
      profile:
        description: Editorial profile
        required: false
        default: 'weekly'
        type: choice
        options:
          - daily
          - weekly
      locale:
        description: Locale to run (leave empty for all enabled, or 'en'/'fr')
        required: false
        default: ''

permissions:
  contents: write

# Serialize two runs of weekly-generate on the same ref (scheduled Saturday
# run vs. manual re-run). Queue, don't cancel — see daily-generate.yml.
concurrency:
  group: weekly-generate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # 30 min hard cap (user decision 2026-04-18). The weekly pipeline must
    # complete within this budget: collection + LLM + TTS + R2 upload. Before
    # this cap the weekly ran unchecked for 88+ min because of Chromium hangs
    # (Crawl4AI abandoned the same day). 30 min gives ~5 min headroom over
    # the typical 20-25 min run with httpx async + Cartesia streaming.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        # FR was paused on 2026-04-18 pending voice cloning of the host
        # (user instruction 1.98 — "stop toutes les workflow fr"). The matrix
        # defaults to EN only. Operators can still force a FR run via
        # workflow_dispatch with locale=fr, but the scheduled Saturday run
        # is EN-only until the FR locale is re-enabled in podcast.yaml.
        locale: ${{ fromJSON(github.event.inputs.locale != '' && format('["{0}"]', github.event.inputs.locale) || '["en"]') }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Generate weekly recap draft
        env:
          APR_LOCALE: ${{ matrix.locale }}
          PODCAST_DESCRIPTION_LONG: ${{ vars.PODCAST_DESCRIPTION_LONG }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          # Generic model vars — used when no per-locale override is set.
          LLM_EDITOR_MODEL: ${{ vars.LLM_EDITOR_MODEL }}
          LLM_FALLBACK_MODEL: ${{ vars.LLM_FALLBACK_MODEL }}
          # Optional 3rd cascade tier — see daily-generate.yml for rationale.
          LLM_EMERGENCY_MODEL: ${{ vars.LLM_EMERGENCY_MODEL }}
          # Per-locale model overrides — see daily-generate.yml. Same vars,
          # same logic: settings._apply_locale() switches the editor/fallback
          # based on APR_LOCALE so EN and FR can run on different downstream
          # models from one OpenRouter API key.
          LLM_EDITOR_MODEL_EN: ${{ vars.LLM_EDITOR_MODEL_EN }}
          LLM_FALLBACK_MODEL_EN: ${{ vars.LLM_FALLBACK_MODEL_EN }}
          LLM_EMERGENCY_MODEL_EN: ${{ vars.LLM_EMERGENCY_MODEL_EN }}
          LLM_EDITOR_MODEL_FR: ${{ vars.LLM_EDITOR_MODEL_FR }}
          LLM_FALLBACK_MODEL_FR: ${{ vars.LLM_FALLBACK_MODEL_FR }}
          LLM_EMERGENCY_MODEL_FR: ${{ vars.LLM_EMERGENCY_MODEL_FR }}
          # Per-tier endpoint overrides — let the emergency tier point at a
          # different provider (e.g. DeepInfra) so an OpenRouter incident on
          # tiers 1+2 still leaves a working escape hatch. Empty values fall
          # through to LLM_BASE_URL / LLM_API_KEY.
          LLM_EMERGENCY_BASE_URL_EN: ${{ vars.LLM_EMERGENCY_BASE_URL_EN }}
          LLM_EMERGENCY_API_KEY_EN: ${{ secrets.LLM_EMERGENCY_API_KEY_EN || secrets.DEEPINFRA_API_KEY }}
          LLM_EMERGENCY_BASE_URL_FR: ${{ vars.LLM_EMERGENCY_BASE_URL_FR }}
          LLM_EMERGENCY_API_KEY_FR: ${{ secrets.LLM_EMERGENCY_API_KEY_FR || secrets.DEEPINFRA_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          # Free Layer-2 crawler fallback (Jina Reader). Anonymous if unset.
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          JINA_READER_ENABLED: ${{ vars.JINA_READER_ENABLED }}
          CARTESIA_API_KEY: ${{ secrets.CARESTIA_API_KEY }}
          CARTESIA_VOICE_ID: ${{ vars.CARTESIA_VOICE_ID }}
          CARTESIA_VOICE_ID_FR: ${{ vars.CARTESIA_VOICE_ID_FR }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWS_API_KEY }}
          # Shell-injection hardening — see daily-generate.yml for the pattern.
          RUN_DATE_INPUT: ${{ github.event.inputs.run_date }}
          PROFILE_INPUT: ${{ github.event.inputs.profile || 'weekly' }}
        run: |
          set -e
          # ── Pre-flight: fail fast on missing secrets/variables ──────────────
          # Weekly collection takes 25+ min on GitHub-hosted runners. Before
          # this pre-flight, a missing LLM_API_KEY (or any required config)
          # meant the whole run burned its 30-min timeout crawling, then got
          # ##[error] canceled with no indication of the real cause. The
          # operator had to dig into the first 1% of the log to find the
          # "LLM_API_KEY is not set" warning. Now we block in ~5 seconds
          # with a consolidated list of every missing key. See also
          # daily-generate.yml which uses the same block.
          python3 - <<'PREFLIGHT'
          import os, sys
          locale = os.environ.get("APR_LOCALE", "en").strip().lower() or "en"
          voice_var = "CARTESIA_VOICE_ID_FR" if locale == "fr" else "CARTESIA_VOICE_ID"
          # (name, kind, what-it-does) — kind is shown so the operator knows
          # which of the two Actions tabs (Secrets vs Variables) to open.
          required = [
              ("LLM_API_KEY",         "secret",   "OpenRouter API key (editorial)"),
              ("CARTESIA_API_KEY",    "secret",   "Cartesia API key (TTS)"),
              ("R2_ACCESS_KEY_ID",    "secret",   "Cloudflare R2 access key ID (audio upload)"),
              ("R2_SECRET_ACCESS_KEY","secret",   "Cloudflare R2 secret access key (audio upload)"),
              ("R2_BUCKET_NAME",      "variable", "Cloudflare R2 bucket name"),
              ("R2_ENDPOINT",         "variable", "Cloudflare R2 endpoint URL"),
              (voice_var,             "variable", f"Cartesia voice ID for locale={locale}"),
          ]
          placeholders = {"none", "null", "placeholder", "changeme",
                          "your-api-key", "your_api_key", "xxx", "todo"}
          missing = []
          for name, kind, desc in required:
              val = os.environ.get(name, "").strip()
              if not val:
                  missing.append(f"  - {name} ({kind}) -- {desc}")
              elif val.lower() in placeholders:
                  missing.append(f"  - {name} ({kind}) -- placeholder value {val!r}, {desc}")
          # R2 credential length check — same as daily-generate.yml (keep in sync).
          r2_ak = os.environ.get("R2_ACCESS_KEY_ID", "").strip()
          r2_sk = os.environ.get("R2_SECRET_ACCESS_KEY", "").strip()
          if r2_ak and len(r2_ak) != 32:
              missing.append(
                  f"  - R2_ACCESS_KEY_ID has {len(r2_ak)} chars (expected 32) -- "
                  "go to Cloudflare R2 → Manage API Tokens → create an R2-specific token"
              )
          if r2_sk and len(r2_sk) != 64:
              missing.append(
                  f"  - R2_SECRET_ACCESS_KEY has {len(r2_sk)} chars (expected 64) -- "
                  "go to Cloudflare R2 → Manage API Tokens → create an R2-specific token"
              )
          if missing:
              sys.exit(
                  "ERROR: required secrets/variables are missing or empty:\n"
                  + "\n".join(missing)
                  + "\n\nGo to repo Settings -> Secrets and variables -> Actions.\n"
                  "  Secrets in the 'Secrets' tab. Variables in the 'Variables' tab.\n"
                  "  R2 keys: Cloudflare Dashboard → R2 → Manage API Tokens."
              )
          llm_key = os.environ["LLM_API_KEY"].strip()
          hint = llm_key[:6] + "..." if len(llm_key) > 6 else llm_key[:3] + "..."
          print(f"Pre-flight OK - LLM_API_KEY: {len(llm_key)} chars, starts with {hint}")
          print(f"Pre-flight OK - R2_ACCESS_KEY_ID: {len(r2_ak)} chars (expected 32)")
          print(f"Pre-flight OK - R2_SECRET_ACCESS_KEY: {len(r2_sk)} chars (expected 64)")
          PREFLIGHT
          RUN_DATE="${RUN_DATE_INPUT}"
          if [ -z "$RUN_DATE" ]; then RUN_DATE=$(date +%F); fi
          # Convert European JJ/MM/AA or JJ/MM/AAAA → YYYY-MM-DD for internal use
          if [[ "$RUN_DATE" =~ ^([0-9]{2})/([0-9]{2})/([0-9]{2})$ ]]; then
            RUN_DATE="20${BASH_REMATCH[3]}-${BASH_REMATCH[2]}-${BASH_REMATCH[1]}"
          elif [[ "$RUN_DATE" =~ ^([0-9]{2})/([0-9]{2})/([0-9]{4})$ ]]; then
            RUN_DATE="${BASH_REMATCH[3]}-${BASH_REMATCH[2]}-${BASH_REMATCH[1]}"
          fi
          if ! [[ "$RUN_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::Invalid run_date format: $RUN_DATE (expected JJ/MM/AA, e.g. 18/04/26)"
            exit 1
          fi
          PROFILE_INPUT=$(echo "$PROFILE_INPUT" | tr '[:upper:]' '[:lower:]' | tr '-' '_')
          case "$PROFILE_INPUT" in
            daily) PROFILE="daily" ;;
            weekly|weekly_recap) PROFILE="weekly_recap" ;;
            *) echo "::error::Invalid profile: $PROFILE_INPUT"; exit 1 ;;
          esac
          echo "Generating ${PROFILE} draft for locale=$APR_LOCALE date=$RUN_DATE"
          python scripts/generate_draft.py --date "$RUN_DATE" --profile "$PROFILE"

      - name: Commit draft state
        env:
          LOCALE: ${{ matrix.locale }}
          RUN_DATE_INPUT: ${{ github.event.inputs.run_date }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # --autostash because the pipeline may have modified tracked files
          # (e.g. data/state/episode_history_{locale}.json) before this step.
          git pull --rebase --autostash origin main
          # Same fail-safe as daily-generate — see that file for the 2026-04-16
          # incident report. Committing conflict markers bricks next run.
          if git grep -l -E '^(<<<<<<< |=======$|>>>>>>> )' -- data/state/ data/sources/ docs/ 2>/dev/null; then
            echo "::error::Unresolved conflict markers in staged paths — refusing to commit"
            git status
            exit 1
          fi
          git add -f data/state/ data/sources/ docs/
          MSG_DATE="${RUN_DATE_INPUT:-auto}"
          git diff --cached --quiet || git commit -m "draft: weekly recap ${LOCALE} ${MSG_DATE} [skip ci]"
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "push rejected — rebasing (attempt $attempt)"
            git pull --rebase origin main
          done
          echo "::error::push failed after 3 rebase attempts"
          exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-draft-output-${{ matrix.locale }}
          path: output/
          retention-days: 7
