# ──────────────────────────────────────────────────────────────
#  AI PRESS REVIEW — CONFIGURATION CENTRALE
#  Modifie ce fichier directement sur GitHub pour ajuster les parametres.
#  Les changements prennent effet au prochain run du workflow.
# ──────────────────────────────────────────────────────────────

# ── PODCAST METADATA ──────────────────────────────────────────
title: "AI Press Review"
subtitle: "Factual, Clear, Built for Busy Professionals"
author: "David Perron"
email: "david.perron@aequitus.net"
author_email: "david.perron@aequitus.net"
language: "en"
category_primary: "Business"
category_secondary: "Artificial Intelligence"
tagline: "40 sources. 15 minutes. What matters in AI today."
short_description: "40 sources. 15 minutes. What matters in AI today."
long_description: >
  Every weekday morning at 7AM CET, AI Press Review distills 40+ global sources
  into a focused 15-minute briefing — filtered, weighted, and structured around
  six pillars: AI News, Research & Breakthroughs, Use Cases, Tools & Practice,
  Weak Signals, and Education. Built for professionals who need signal, not noise.
  Every Saturday: a weekly recap of the five trends that defined the week.
  Also available in French at podcast.aequitus.net/fr.
feed_url: "https://podcast.aequitus.net/podcast-feed.xml"
site_url: "https://podcast.aequitus.net"
public_audio_base_url: "https://pub-bc812f72712b450fbb9d7f3455e007a0.r2.dev/pressreview"
cover_image: "assets/podcast-cover.png"

# ── EDITORIAL (defaults — les profils peuvent surcharger) ────
editorial:
  target_duration_min: 14
  target_duration_max: 18
  min_script_words: 2100
  min_source_count: 15
  freshness_hours: 48
  exclude_previous_episode: true

# ── LLM ───────────────────────────────────────────────────────
llm:
  max_tokens: 12000
  temperature: 0.2
  timeout_seconds: 180

# ── TTS (Cartesia) ───────────────────────────────────────────
# Voice: Benoit (5def377d-908b-4540-8bd7-3c968fcae351) — set via
# CARTESIA_VOICE_ID GitHub secret, not here.
# Speed 0.90 + emotion "serious" = ~176 WPM, timbre validated by user
# on 471-word ear-test (PHASE8-T5-voice-benoit-090.mp3).
tts:
  # 2026-04-15: reduced 1500 → 900 to mitigate Cartesia websocket quality
  # degradation on long scripts (FR dropped at ~minute 3, EN at ~minute 7).
  # Smaller chunks within a single context_id session give the model more
  # frequent paragraph boundaries to re-anchor prosody. Transitions remain
  # seamless because context_id + continue=true preserve voice state across
  # chunks in the same websocket session (validated Phase 8/T5 ear-test).
  chunk_max_chars: 900
  speed: 0.9
  volume: 1.0
  emotion: "serious"
  # Render mode — overridable per locale:
  #   'websocket': one continue=true session for the full script (EN default)
  #   'chunks':    independent session per chunk + crossfade (FR default)
  mode: "websocket"
  chunk_crossfade_ms: 80

# ── PUBLICATION ───────────────────────────────────────────────
retention_days: 10
publish_timezone: "Europe/Paris"

schedule:
  publish_hour_local: 7
  weekdays_only: false

# ──────────────────────────────────────────────────────────────
#  LOCALES — PODCASTS MULTILINGUES
#  Chaque locale genere son propre feed RSS, ses propres pages
#  et son propre prefixe audio R2. Les champs top-level ci-dessus
#  restent les defauts EN pour compatibilite descendante.
#  Le workflow matrix daily-generate.yml itere sur les locales
#  dont enabled=true.
# ──────────────────────────────────────────────────────────────
locales:
  en:
    enabled: true
    title: "AI Press Review"
    subtitle: "Factual, Clear, Built for Busy Professionals"
    language: "en"
    tagline: "40 sources. 15 minutes. What matters in AI today."
    short_description: "40 sources. 15 minutes. What matters in AI today."
    long_description: >
      Every weekday morning at 7AM CET, AI Press Review distills 40+ global sources
      into a focused 15-minute briefing — filtered, weighted, and structured around
      six pillars: AI News, Research & Breakthroughs, Use Cases, Tools & Practice,
      Weak Signals, and Education. Built for professionals who need signal, not noise.
      Every Saturday: a weekly recap of the five trends that defined the week.
      Also available in French at podcast.aequitus.net/fr.
    feed_url: "https://podcast.aequitus.net/podcast-feed.xml"
    site_url: "https://podcast.aequitus.net"
    public_audio_base_url: "https://pub-bc812f72712b450fbb9d7f3455e007a0.r2.dev/pressreview"
    cover_image: "assets/podcast-cover.png"
    docs_subdir: ""                        # racine de docs/
    prompt_daily: "prompt_system.txt"
    prompt_weekly: "prompt_weekly.txt"
    category_primary: "Business"
    category_secondary: "Artificial Intelligence"
    opening_line_daily: "Your Daily AI Press Review"
    opening_line_weekly: "Your Weekly AI Press Review"
    # TTS locale-specific overrides (voice, speed, emotion, language)
    voice_id_env: "CARTESIA_VOICE_ID"      # secret GitHub existant
    cartesia_language: "en"
    tts_speed: 0.9
    tts_emotion: "serious"
    tts_mode: "websocket"    # one continue=true session: seamless prosody, validated up to ~15 min

  fr:
    enabled: true
    title: "Revue de Presse IA"
    subtitle: "Factuel, clair, pense pour les professionnels presses"
    language: "fr"
    tagline: "40 sources. 15 minutes. Ce qui compte aujourd'hui en IA."
    short_description: "40 sources. 15 minutes. Ce qui compte aujourd'hui en IA."
    long_description: >
      Chaque matin a 7h, la Revue de Presse IA distille plus de 40 sources
      internationales en un brief de 15 minutes — filtre, pondere, et structure
      autour de six piliers : Actualite IA, Recherche et Percees, Cas d'usage,
      Outils et Pratique, Signaux faibles, et Pedagogie. Pense pour les
      professionnels qui ont besoin de signal, pas de bruit.
      Chaque samedi : le recap des cinq tendances qui ont defini la semaine.
    feed_url: "https://podcast.aequitus.net/fr/podcast-feed.xml"
    site_url: "https://podcast.aequitus.net/fr"
    # R2 bucket is shared with EN (pressreview). This used to override the base
    # to ".../pressreview-fr" but that bucket/prefix was never actually created
    # on R2 — uploads went to `pressreview` while URLs pointed at
    # `pressreview-fr`, yielding 404 on every FR audio (observed 2026-04-15).
    # Slugs are locale-distinct (French titles → French slugs) so collisions
    # in the shared bucket are a non-issue in practice.
    public_audio_base_url: "https://pub-bc812f72712b450fbb9d7f3455e007a0.r2.dev/pressreview"
    cover_image: "assets/podcast-cover.png"   # reutilise cover EN pour demarrer
    docs_subdir: "fr"                         # docs/fr/
    prompt_daily: "prompt_system_fr.txt"
    prompt_weekly: "prompt_weekly_fr.txt"
    category_primary: "Business"
    category_secondary: "Artificial Intelligence"
    opening_line_daily: "Votre Revue de Presse IA du jour"
    opening_line_weekly: "Votre Revue de Presse IA hebdo"
    # TTS locale-specific overrides
    voice_id_env: "CARTESIA_VOICE_ID_FR"   # nouveau secret GitHub
    cartesia_language: "fr"                # CRITIQUE pour prosodie francaise
    # Speed 0.88: raised from 0.82 to match the EN feel more closely —
    # same "serious" journalistic tone, pauses driven by sentence-length capping
    # (_cap_sentence_length in tts/cartesia.py) rather than manual speed reduction.
    tts_speed: 0.88
    tts_emotion: "serious"
    # chunks mode: each paragraph block is synthesized as a self-contained
    # WebSocket session, then segments are crossfaded together. Eliminates the
    # noise + volume degradation observed in FR after ~2 min of a single long
    # continue=true session. 80 ms crossfade is inaudible at normal volume.
    tts_mode: "chunks"
    tts_chunk_crossfade_ms: 80

# ──────────────────────────────────────────────────────────────
#  PROFILS EDITORIAUX
#  Chaque profil surcharge les parametres editorial ci-dessus.
#  Pour creer un nouveau workflow : ajoutez un profil ici,
#  creez le prompt correspondant dans config/, et ajoutez
#  un workflow dans .github/workflows/.
# ──────────────────────────────────────────────────────────────
profiles:
  daily:
    description: "Episode quotidien Lun-Ven"
    freshness_hours: 48
    exclude_previous_episode: true
    prefer_unused: false
    min_source_count: 40        # hard minimum — pipeline warns if below
    min_script_words: 2500
    target_duration_min: 16
    target_duration_max: 22
    prompt_file: "prompt_system.txt"
    intro_format: "daily"

  weekly_recap:
    description: "Recap hebdomadaire — Samedi"
    freshness_hours: 168
    exclude_previous_episode: false
    prefer_unused: true
    unused_score_bonus: 2.0
    reuse_min_score: 8.0
    min_source_count: 45
    min_script_words: 2200
    target_duration_min: 18
    target_duration_max: 24
    prompt_file: "prompt_weekly.txt"
    intro_format: "weekly"

# ── SCORING DES SOURCES ──────────────────────────────────────
# Le score determine quelles sources sont selectionnees.
# Plus le score est eleve, plus la source est prioritaire.

scoring:
  # Lower thresholds so 40+ sources pass through each day.
  # Rationale: RSS summary-only articles have no content_text, so the
  # content-depth component scores 0.  A relevance score of 2.0 can be
  # reached with just 1 high-weight AI term (3.0 pts, capped at 5.0) plus
  # minimal signal words — i.e. any clearly AI-focused article passes.
  min_relevance: 2.0        # was 3.0
  min_text_length: 100      # was 180 — shorter summaries are still citable
  similarity_threshold: 0.88
  max_per_domain: 7

  # Mots-cles interdits — articles hors-sujet uniquement.
  # NOTE: "policy" / "regulation" alone are too broad — AI policy IS relevant.
  # Only exclude articles that are PURELY political/social noise with no AI angle.
  banned_terms:
    - "antitrust settlement"
    - "rumor"
    - "rumour"
    - "celebrity"
    - "sports"
    - "recipe"
    - "horoscope"

  # Termes AI — poids fort (score +3.0 par match)
  ai_terms_high:
    - "artificial intelligence"
    - "generative ai"
    - "large language model"
    - "foundation model"
    - "text to speech"
    - "voice model"

  # Termes AI — poids moyen (score +1.5 par match)
  ai_terms_mid:
    - "ai"
    - "llm"
    - "agent"
    - "inference"
    - "copilot"
    - "benchmark"
    - "gpu"
    - "datacenter"
    - "data center"

  # Termes AI — poids faible (score +0.5 par match)
  ai_terms_low:
    - "model"
    - "chip"
    - "research"
    - "deployment"
    - "automation"

  # Mots-signaux forts (score +1.0 par match, max 4.0)
  signal_words_strong:
    - "benchmark"
    - "launch"
    - "funding"
    - "deploy"
    - "revenue"
    - "inference"
    - "training"
    - "open source"
    - "api"
    - "fine-tune"
    - "architecture"
    - "parameter"
    - "token"
    - "multimodal"

  # Mots-signaux moyens (score +0.5 par match, max 2.0)
