# ──────────────────────────────────────────────────────────────
#  AI PRESS REVIEW — CONFIGURATION CENTRALE
#  Modifie ce fichier directement sur GitHub pour ajuster les parametres.
#  Les changements prennent effet au prochain run du workflow.
# ──────────────────────────────────────────────────────────────

# ── PODCAST METADATA ──────────────────────────────────────────
title: "AI Press Review"
subtitle: "40 sources. 15 minutes. What matters in AI today."
author: "David Perron"
email: "david.perron@aequitus.net"
language: "en"
category_primary: "Business"
category_secondary: "Artificial Intelligence"
short_description: "40 sources. 15 minutes. What matters in AI today."
long_description: |
  AI Press Review is a daily AI news briefing — published every morning at 7AM CET, Monday through Sunday. Each episode draws from 40+ weighted global sources, structured across six editorial pillars: AI News, Research & Breakthroughs, Use Cases, Tools & Practice, Weak Signals, and Education.

  Sources are selected by domain authority and editorial standards. Regulatory speculation, unverified rumors, and opinion pieces are excluded.

  Every Saturday: a weekly recap of the five trends that defined the week.

  Hosted by David Perron.
feed_url: "https://podcast.aequitus.net/podcast-feed.xml"
site_url: "https://podcast.aequitus.net"
public_audio_base_url: "https://www.ashcroftedition.org"
cover_image: "assets/podcast-cover.png"

# ── DISTRIBUTION ──────────────────────────────────────────────
# URLs publiques d'ecoute. Laisse vide tant que la soumission n'a pas
# ete acceptee — le bouton correspondant est masque automatiquement.
distribution:
  apple_podcasts_url: ""
  spotify_url: ""
  youtube_url: ""

# ── EDITORIAL (defaults — les profils peuvent surcharger) ────
editorial:
  target_duration_min: 14
  target_duration_max: 18
  min_script_words: 2200
  min_source_count: 45
  freshness_hours: 48
  exclude_previous_episode: true
  # single_pass: un seul appel LLM (comportement historique).
  # multi_pass: pass "ledger" (extraction structuree des stories) suivi
  # d'un pass "writer" qui recoit la ledger + texte complet des sources
  # citees uniquement. Meilleur structure, meilleur hit caching, mais
  # +1 appel LLM par run (typiquement ~1.3x cost avec caching, ~2.5x sans).
  mode: single_pass
  # Grounding: seuils pour la verification claim -> source.
  grounding_min_overlap: 0.55
  grounding_min_coverage: 0.70

# ── LLM ───────────────────────────────────────────────────────
llm:
  max_tokens: 12000
  temperature: 0.2
  timeout_seconds: 180
  # Si ton LLM_BASE_URL pointe vers un backend Anthropic-compatible
  # (Anthropic direct, OpenRouter, LiteLLM), active le cache pour
  # reduire de ~90% le cout des tokens stables (system prompt + manifest).
  # Sur les backends qui ne connaissent pas cache_control, l'option est
  # silencieusement ignoree.
  enable_prompt_cache: true
  # Laisser vide pour utiliser llm_editor_model comme ledger. Specifier
  # un modele moins cher (ex. Haiku/GPT-4o-mini) pour reduire le cout
  # du multi-pass.
  ledger_model: ""

# ── TTS (Cartesia) ───────────────────────────────────────────
tts:
  chunk_max_chars: 1800
  speed: 0.97
  volume: 1.0
  emotion: "curiosity:high,confidence:high"

# ── PUBLICATION ───────────────────────────────────────────────
retention_days: 10
publish_timezone: "Europe/Paris"

schedule:
  publish_hour_local: 7
  weekdays_only: false

# ──────────────────────────────────────────────────────────────
#  PROFILS EDITORIAUX
#  Chaque profil surcharge les parametres editorial ci-dessus.
#  Pour creer un nouveau workflow : ajoutez un profil ici,
#  creez le prompt correspondant dans config/, et ajoutez
#  un workflow dans .github/workflows/.
# ──────────────────────────────────────────────────────────────
profiles:
  daily:
    description: "Episode quotidien Lun-Ven"
    freshness_hours: 48
    exclude_previous_episode: true
    prefer_unused: false
    min_source_count: 45
    min_script_words: 2200
    target_duration_min: 14
    target_duration_max: 18
    prompt_file: "prompt_system.txt"
    intro_format: "daily"

  weekly_recap:
    description: "Recap hebdomadaire — Samedi"
    freshness_hours: 168
    exclude_previous_episode: false
    prefer_unused: true
    unused_score_bonus: 2.0
    reuse_min_score: 8.0
    min_source_count: 60
    min_script_words: 3000
    target_duration_min: 18
    target_duration_max: 24
    prompt_file: "prompt_weekly.txt"
    intro_format: "weekly"

# ── SCORING DES SOURCES ──────────────────────────────────────
# Le score determine quelles sources sont selectionnees.
# Plus le score est eleve, plus la source est prioritaire.

scoring:
  min_relevance: 3.0
  min_text_length: 180
  similarity_threshold: 0.88
  max_per_domain: 5

  # Mots-cles interdits — les articles contenant ces termes sont exclus
  banned_terms:
    - "policy"
    - "regulation"
    - "regulatory"
    - "lawmakers"
    - "legislation"
    - "compliance rule"
    - "executive order"
    - "government policy"
    - "antitrust settlement"
    - "rumor"
    - "rumour"

  # Termes AI — poids fort (score +3.0 par match)
  ai_terms_high:
    - "artificial intelligence"
    - "generative ai"
    - "large language model"
    - "foundation model"
    - "text to speech"
    - "voice model"

  # Termes AI — poids moyen (score +1.5 par match)
  ai_terms_mid:
    - "ai"
    - "llm"
    - "agent"
    - "inference"
    - "copilot"
    - "benchmark"
    - "gpu"
    - "datacenter"
    - "data center"

  # Termes AI — poids faible (score +0.5 par match)
  ai_terms_low:
    - "model"
    - "chip"
    - "research"
    - "deployment"
    - "automation"

  # Mots-signaux forts (score +1.0 par match, max 4.0)
  signal_words_strong:
    - "benchmark"
    - "launch"
    - "funding"
    - "deploy"
    - "revenue"
    - "inference"
    - "training"
    - "open source"
    - "api"
    - "fine-tune"
    - "architecture"
    - "parameter"
    - "token"
    - "multimodal"

  # Mots-signaux moyens (score +0.5 par match, max 2.0)
  signal_words_medium:
    - "latency"
    - "chip"
    - "model"
    - "agent"
    - "research"
    - "paper"
    - "deployment"
    - "startup"
    - "enterprise"
    - "scale"

  # Autorite des domaines — bonus automatique par source
  domain_authority:
    "openai.com": 2.0
    "anthropic.com": 2.0
    "blog.google": 2.0
    "deepmind.google": 2.0
    "ai.meta.com": 2.0
    "nvidia.com": 1.5
    "blogs.nvidia.com": 1.5
    "huggingface.co": 1.5
    "arxiv.org": 1.5
    "techcrunch.com": 1.0
    "venturebeat.com": 1.0
    "theverge.com": 0.8
    "reuters.com": 1.0
    "bloomberg.com": 1.0
