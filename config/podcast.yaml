    # segments are crossfaded. Eliminates noise/volume degradation after ~2 min
    # of a single long session.
    # chunk_max_chars 1400 (vs 900 default): fewer sessions → fewer chunk-start
    # acceleration artifacts from Cartesia model warm-up.
    # crossfade_ms 80: shorter overlap reduces audible blend at boundaries.
    tts_mode: "chunks"
    tts_chunk_max_chars: 1400
    tts_chunk_crossfade_ms: 80

# ──────────────────────────────────────────────────────────────
#  PROFILS EDITORIAUX
#  Chaque profil surcharge les parametres editorial ci-dessus.
#  Pour creer un nouveau workflow : ajoutez un profil ici,
#  creez le prompt correspondant dans config/, et ajoutez
#  un workflow dans .github/workflows/.
# ──────────────────────────────────────────────────────────────
profiles:
  daily:
    description: "Episode quotidien Mar-Ven"
    freshness_hours: 48
    exclude_previous_episode: true
    prefer_unused: false
    min_source_count: 40        # hard minimum — pipeline warns if below
    # 14-18 min @ ~180 WPM → 2520-3240 mots. Gate à 2700 pour viser 15 min
    # minimum garanti avec marge TTS. Target LLM calculé = 3200 (cf. generator.py).
    min_script_words: 2700
    target_duration_min: 14
    target_duration_max: 18
    prompt_file: "prompt_system.txt"
    intro_format: "daily"

  weekly_recap:
    description: "Recap hebdomadaire — Samedi"
    freshness_hours: 168
    exclude_previous_episode: false
    prefer_unused: true
    unused_score_bonus: 2.0
    reuse_min_score: 8.0
    min_source_count: 45
    # 22-25 min @ ~180 WPM → 3960-4500 mots. Gate abaissée à 3200 (2026-04-19):
    # Claude Sonnet 4.6 produit ~3400 mots sur tentative 1 (sans force_length) mais
    # plafonne systématiquement sous 3700 — les tentatives force_length sont moins
    # bonnes (3373 → 3031), confirmant que 3700 est hors portée du modèle actuel.
    # 3200 mots @ 180 WPM = ~17.8 min minimum garanti.
    # Remonter à 3700 si le modèle éditorial est remplacé par un plus capable.
    min_script_words: 3200
    target_duration_min: 22
    target_duration_max: 25
    prompt_file: "prompt_weekly.txt"
    intro_format: "weekly"

# ── SCORING DES SOURCES ──────────────────────────────────────
# Le score determine quelles sources sont selectionnees.
# Plus le score est eleve, plus la source est prioritaire.

scoring:
  # Lower thresholds so 40+ sources pass through each day.
  # Rationale: RSS summary-only articles have no content_text, so the
  # content-depth component scores 0.  A relevance score of 2.0 can be
  # reached with just 1 high-weight AI term (3.0 pts, capped at 5.0) plus
  # minimal signal words — i.e. any clearly AI-focused article passes.
  min_relevance: 2.0        # was 3.0
  min_text_length: 100      # was 180 — shorter summaries are still citable
  similarity_threshold: 0.88
  max_per_domain: 7

  # Mots-cles interdits — articles hors-sujet uniquement.
  # NOTE: "policy" / "regulation" alone are too broad — AI policy IS relevant.
  # Only exclude articles that are PURELY political/social noise with no AI angle.
  banned_terms:
    - "antitrust settlement"
    - "rumor"
    - "rumour"
    - "celebrity"
    - "sports"
    - "recipe"
    - "horoscope"

  # Termes AI — poids fort (score +3.0 par match)
  ai_terms_high:
    - "artificial intelligence"
    - "generative ai"
    - "large language model"
    - "foundation model"
    - "text to speech"
    - "voice model"

  # Termes AI — poids moyen (score +1.5 par match)
  # Enriched 2026-04-18: adds transformer, diffusion, reasoning, rag, and
  # other technical terms that are strong AI-relevance signals on their own.
  ai_terms_mid:
    - "ai"
    - "llm"
    - "agent"
    - "inference"
    - "copilot"
    - "benchmark"
    - "gpu"
    - "datacenter"
    - "data center"
    - "transformer"
    - "diffusion"
    - "reasoning"
    - "rag"
    - "retrieval augmented"
    - "finetune"
    - "fine-tuning"
    - "pretrain"
    - "embedding"
    - "mixture of experts"
    - "reinforcement learning"
    - "rlhf"

  # Termes AI — poids faible (score +0.5 par match)
