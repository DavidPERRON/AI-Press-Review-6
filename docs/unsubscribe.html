<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Unsubscribe — AI Press Review</title>
  <meta name="description" content="Unsubscribe from the AI Press Review newsletter.">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://podcast.aequitus.net/unsubscribe.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#01040F;--ink:#F4ECDC;--ink-soft:#C5BAA0;--ink-muted:#8E8470;--rule:rgba(217,162,74,.25);--rule-strong:rgba(217,162,74,.5);--gold:#D9A24A;--gold-soft:#BF8520;}
    *{box-sizing:border-box}html,body{margin:0;padding:0}
    body{font-family:'EB Garamond',Garamond,Georgia,serif;background:var(--bg);color:var(--ink);line-height:1.65;font-size:20px;-webkit-font-smoothing:antialiased}
    a{color:var(--gold);text-decoration:none}a:hover{color:#EBC172}
    .banner{padding:2.8rem 1.25rem 2rem;text-align:center;border-bottom:1px solid var(--rule)}
    .banner h1{font-weight:700;font-variant:small-caps;letter-spacing:.28em;color:var(--gold);font-size:clamp(1.6rem,4vw,2.4rem);margin:0 0 .4rem}
    .banner p{color:var(--ink-soft);font-style:italic;margin:0}
    .pagenav{text-align:center;padding:.8rem 1rem;border-bottom:1px solid var(--rule)}
    .pagenav a{display:inline-block;margin:0 1rem;font-variant:small-caps;letter-spacing:.16em;font-size:.9rem;color:var(--ink-soft)}
    .pagenav a:hover{color:var(--gold)}
    .wrap{max-width:560px;margin:0 auto;padding:3.2rem 1.25rem 4rem;text-align:center}
    .wrap p{color:var(--ink-soft);font-size:1.08rem;margin:0 0 2rem;font-style:italic}
    .nl-row{display:flex;gap:.5rem;margin:0 0 .8rem}
    .nl-email{flex:1;min-width:0;background:rgba(217,162,74,.04);border:1px solid var(--rule-strong);border-radius:6px;padding:.65rem .9rem;color:var(--ink);font-family:inherit;font-size:1rem;-webkit-appearance:none;appearance:none}
    .nl-email::placeholder{color:var(--ink-muted);opacity:.85}
    .nl-email:focus{outline:none;border-color:var(--gold);background:rgba(217,162,74,.08)}
    .nl-btn{flex:0 0 auto;background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:6px;padding:.65rem 1.4rem;font-family:inherit;font-variant:small-caps;letter-spacing:.16em;font-size:.92rem;font-weight:700;cursor:pointer;transition:background .15s,color .15s}
    .nl-btn:hover:not(:disabled){background:rgba(217,162,74,.12);color:#EBC172}
    .nl-btn:disabled{opacity:.45;cursor:not-allowed}
    .nl-msg{font-size:.92rem;margin:.4rem 0 0;min-height:1.2em}
    .nl-msg.ok{color:var(--gold)}
    .nl-msg.err{color:#E58A6E}
    .back{display:inline-block;margin-top:2.4rem;font-variant:small-caps;letter-spacing:.2em;font-size:.88rem;color:var(--ink-muted)}
    .back:hover{color:var(--gold)}
    footer{margin-top:3rem;padding:1.4rem 1rem 1.6rem;border-top:1px solid var(--rule);text-align:center;color:var(--ink-muted);font-size:.95rem}
    footer .sep{margin:0 .5rem;color:var(--gold);opacity:.6}
    footer a{color:var(--gold)}
    @media(max-width:560px){.nl-row{flex-direction:column}.nl-btn{padding:.7rem 1.2rem}}
  </style>
</head>
<body>

<header class="banner">
  <h1><a href="/" style="color:var(--gold)">AI Press Review</a></h1>
  <p>David Perron</p>
</header>

<nav class="pagenav">
  <a href="/">Home</a>
  <a href="/how-it-works.html">How it works</a>
  <a href="/subscribe.html">Subscribe</a>
</nav>

<div class="wrap">
  <p>Enter your email address below to be removed from the AI Press Review newsletter.</p>
  <form id="unsub-form" novalidate>
    <div class="nl-row">
      <input class="nl-email" type="email" name="email" placeholder="you@example.com" required maxlength="254" autocomplete="email" aria-label="Your email address">
      <button class="nl-btn" type="submit">Unsubscribe</button>
    </div>
    <p class="nl-msg" id="unsub-msg" role="status" aria-live="polite"></p>
  </form>
  <a class="back" href="/">&larr; Back to home</a>
</div>

<footer>
  <a href="/">AI Press Review</a><span class="sep">&middot;</span><a href="/subscribe.html">Subscribe</a><span class="sep">&middot;</span><a href="/how-it-works.html">How it works</a><span class="sep">&middot;</span><a href="mailto:david.perron@aequitus.net">Contact</a>
</footer>

<script>
(function() {
  var form = document.getElementById('unsub-form');
  var msg  = document.getElementById('unsub-msg');
  var btn  = form.querySelector('button');
  var API  = 'https://aequitus.net/api/unsubscribe.php';

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var email = form.querySelector('[name=email]').value.trim();
    msg.textContent = '';
    msg.className = 'nl-msg';
    if (!email || email.indexOf('@') < 1) {
      msg.textContent = 'That email looks invalid.';
      msg.className = 'nl-msg err';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Sending…';
    fetch(API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: email, locale: 'en'})
    })
    .then(function(r) { return r.json().then(function(j) { return {status: r.status, body: j}; }); })
    .then(function(res) {
      btn.disabled = false;
      btn.textContent = 'Unsubscribe';
      if (res.body && res.body.ok) {
        msg.textContent = 'Done — you have been removed from the list.';
        msg.className = 'nl-msg ok';
        form.reset();
      } else {
        msg.textContent = (res.body && res.body.error) === 'not_found'
          ? 'That address was not found in our list.'
          : 'Something went wrong — please try again or email david.perron@aequitus.net.';
        msg.className = 'nl-msg err';
      }
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = 'Unsubscribe';
      msg.textContent = "Couldn’t reach the server — check your connection.";
      msg.className = 'nl-msg err';
    });
  });
})();
</script>
</body>
</html>
